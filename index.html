<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드쇼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --duration: 15;
      /* 🌸 파스텔 팔레트 — 하늘색 + 벚꽃 */
      --accent:      #7EC8E3;   /* sky blue */
      --accent-mid:  #5AAFC8;   /* deeper sky */
      --accent-dark: #1E3A5F;   /* dark navy text */
      --sakura:      #F7A8C4;   /* cherry blossom */
      --sakura-mid:  #E87FA0;   /* deeper sakura */
      --sky-pale:    #EBF7FD;   /* pale sky bg */
      --sakura-pale: #FFF0F6;   /* pale sakura bg */
      --bg-cream:    #FFFFFF;   /* pure white */
      --font-display: 'Bebas Neue', cursive;
      --font-body: 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: none;
      background: var(--bg-cream);
      font-family: var(--font-body);
    }

    /* ============================================================
       CUSTOM CURSOR
    ============================================================ */
    #cursor {
      position: fixed;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, opacity 0.4s ease;
      will-change: transform;
    }
    #cursor.clicking { width: 44px; height: 44px; }
    #cursor.ui-hidden { opacity: 0; }

    /* ============================================================
       SLIDESHOW WRAPPER
    ============================================================ */
    #slideshow {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ============================================================
       SLIDE BASE
    ============================================================ */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
      overflow: hidden;
    }
    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Background canvas */
    .slide-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* Large ghost number */
    .slide-ghost-num {
      position: absolute;
      right: 6vw;
      bottom: 8vh;
      font-family: var(--font-display);
      font-size: clamp(100px, 20vw, 280px);
      line-height: 1;
      pointer-events: none;
      z-index: 1;
      user-select: none;
    }

    /* ============================================================
       SLIDE CONTENT AREA
    ============================================================ */
    .slide-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 7vh 10vw;
    }

    /* ============================================================
       STAGGER ANIMATION — 꽃봉오리 자라나듯 (grow-up)
    ============================================================ */
    .s-el {
      opacity: 0;
      transform: translateY(22px) scale(0.97);
      transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .slide.active .s-el.in {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ============================================================
       SHARED TYPOGRAPHY
    ============================================================ */
    .s-tag {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;       /* 둥근 pill 형태 */
      margin-bottom: 2.2vh;
      display: inline-block;
    }

    .s-badge {
      font-size: clamp(10px, 1vw, 12px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1.5px solid var(--accent-mid);
      color: var(--accent-mid);
      padding: 4px 14px;
      border-radius: 20px;       /* 둥근 pill 형태 */
      margin-bottom: 2vh;
      display: inline-block;
      backdrop-filter: blur(6px);
    }

    .s-title {
      font-size: clamp(44px, 7.5vw, 108px);
      font-weight: 900;
      line-height: 1.02;
      margin-bottom: 2.5vh;
      white-space: pre-line;
    }

    .s-subtitle {
      font-family: var(--font-body);
      font-size: min(4vw, 58px);   /* 이전 대비 20% 축소 + 한 줄 유지 */
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.3;
      white-space: nowrap;
    }

    /* title + subtitle 가로 배치 (way / culture-item 전용) */
    .title-sub-row {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2vw, 48px);
      margin-bottom: 2.8vh;
      flex-wrap: nowrap;            /* 행 자체도 절대 줄바꿈 안 함 */
      min-width: 0;
    }
    .title-sub-row .s-title {
      margin-bottom: 0;
      white-space: nowrap;
      flex-shrink: 0;               /* 타이틀은 크기 고정 */
    }
    .title-sub-row .s-subtitle {
      padding-left: 1.4vw;
      border-left: 3px solid var(--accent);
      min-width: 0;
    }

    .s-divider {
      width: 56px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 3vh;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .s-body {
      font-size: clamp(15px, 1.7vw, 24px);
      font-weight: 300;
      line-height: 1.85;
      white-space: pre-line;
      max-width: 65vw;
    }

    /* ============================================================
       INTRO TYPE — items row
    ============================================================ */
    .intro-items {
      display: flex;
      gap: clamp(28px, 5vw, 80px);
      margin-top: 4vh;
      flex-wrap: wrap;
    }
    .intro-item { display: flex; flex-direction: column; gap: 4px; }
    .intro-item-num {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 76px);
      color: var(--accent);
      line-height: 1;
    }
    .intro-item-label {
      font-size: clamp(16px, 2.1vw, 30px);
      font-weight: 700;
    }
    .intro-item-desc {
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 300;
      opacity: 0.6;
    }

    /* ============================================================
       SECTION TYPE — grouped values
    ============================================================ */
    .section-groups {
      display: flex;
      flex-direction: column;
      gap: 4vh;
      margin-top: 4vh;
    }
    .section-group-name {
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2vh;
    }
    .section-group-values {
      display: flex;
      gap: clamp(16px, 3vw, 48px);
      flex-wrap: wrap;
    }
    .section-group-val {
      font-size: clamp(22px, 3.2vw, 50px);
      font-weight: 700;
    }

    /* ============================================================
       CULTURE INTRO TYPE — 2×2 grid
    ============================================================ */
    .culture-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3.5vh 6vw;
      margin-top: 4vh;
    }
    .culture-grid-item {
      display: flex;
      align-items: flex-start;
      gap: 1.8vw;
    }
    .culture-grid-num {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 64px);
      color: var(--accent);
      line-height: 1;
      min-width: 2ch;
    }
    .culture-grid-text {}
    .culture-grid-desc {
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 300;
      opacity: 0.55;
      margin-bottom: 0.3vh;
    }
    .culture-grid-label {
      font-size: clamp(16px, 2vw, 30px);
      font-weight: 700;
    }

    /* ============================================================
       QnA SLIDE STYLES
    ============================================================ */
    .qna-container {
      width: 100%; flex: 1 1 0;
      display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
    }

    /* QnA 슬라이드 전용 — 상하좌우 여유 공간 확보 */
    .qna-slide .slide-content {
      justify-content: flex-start;
      padding: 4vh 7vw 4vh;   /* 가장자리 여백 넉넉하게 */
      height: 100%;
    }
    .theme-dark-neon.qna-slide .s-title,
    .theme-dark-amber.qna-slide .s-title { font-size: clamp(16px,1.8vw,24px) !important; margin-bottom:0.3vh !important; }
    .theme-dark-neon.qna-slide .s-tag,
    .theme-dark-amber.qna-slide .s-tag   { margin-bottom:0.4vh !important; font-size:clamp(8px,0.75vw,10px) !important; padding:2px 9px !important; }
    .theme-dark-neon.qna-slide .s-divider,
    .theme-dark-amber.qna-slide .s-divider { margin-bottom:0.6vh !important; height:2px !important; }

    /* 통계 줄 */
    .qna-stats { display:flex; align-items:center; gap:clamp(10px,1.8vw,28px); margin-bottom:1.5vh; flex-wrap:wrap; }
    .qna-stat  { display:flex; flex-direction:column; gap:1px; }
    .qna-stat-val {
      font-family: var(--font-display);
      font-size: clamp(18px,2vw,30px); line-height:1;
      color: var(--accent);
    }
    .qna-stat-val.wait { color:#F4A261; }
    .qna-stat-val.proc { color:#5AAFC8; }
    .qna-stat-val.done { color:#E87FA0; }
    .qna-stat-label { font-size:clamp(8px,0.7vw,10px); font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:rgba(30,58,95,.5); }
    .qna-stat-sep   { width:1px; height:clamp(18px,2.5vh,32px); background:rgba(126,200,227,.25); align-self:center; }

    /* 카드 그리드 — 4열 × 3행, 카드 간 여유 있는 gap */
    .qna-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(8px,1.2vh,16px) clamp(10px,1.2vw,18px);  /* 카드 간 숨 공간 */
      width: 100%;
      flex: 1 1 0;
      min-height: 0;
    }

    /* 카드 — 적당한 크기감, 답답하지 않은 여백 */
    .qna-card {
      background: #FFFFFF;
      border: 1px solid rgba(126,200,227,.18);
      border-radius: 10px;
      border-left: 3px solid transparent;
      padding: clamp(10px,1.1vh,16px) clamp(12px,1vw,16px);  /* 내부 여백 적당히 */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0; min-height: 0;
      box-shadow: 0 2px 16px rgba(126,200,227,0.09);
      overflow: hidden;
    }
    /* 상태별 좌측 컬러바 */
    .qna-card.card-proc { border-left-color: #5AAFC8; }
    .qna-card.card-wait { border-left-color: #F4A261; }
    .qna-card.card-done { border-left-color: #E87FA0; }

    /* 상단 영역: 배지 + 질문 */
    .qna-card-top {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: clamp(4px,0.5vh,7px);
      flex-wrap: wrap;
    }
    .qna-badge {
      font-size: clamp(9px,.65vw,11px);
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .qna-badge-cat  { background:rgba(126,200,227,.15); color:#3A8BAD; border:1px solid rgba(126,200,227,.3); }
    .qna-badge-wait { background:rgba(244,162,97,.15);  color:#C8660A; border:1px solid rgba(244,162,97,.4); }
    .qna-badge-proc { background:rgba(90,175,200,.15);  color:#2A8BAD; border:1px solid rgba(90,175,200,.4); }
    .qna-badge-done { background:rgba(232,127,160,.15); color:#B04070; border:1px solid rgba(232,127,160,.4); }

    /* 질문 텍스트 — 2줄 고정, 통일된 말줄임표 */
    .qna-card-body { flex: 1 1 0; min-height: 0; overflow: hidden; position: relative; }
    .qna-card-q {
      font-size: clamp(11px,.85vw,13px);
      font-weight: 600;
      line-height: 1.55;
      color: #1E3A5F;
      word-break: keep-all;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 하단 답변/상태 영역 */
    .qna-card-footer {
      margin-top: clamp(6px,0.7vh,10px);
      padding-top: clamp(5px,0.6vh,8px);
      border-top: 1px solid rgba(126,200,227,.15);
      font-size: clamp(9px,.68vw,11px);
      line-height: 1.45;
      word-break: keep-all;
    }
    .qna-card-footer.has-ans {
      color: rgba(30,58,95,.65);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .qna-card-footer.no-ans {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(30,58,95,.35);
      font-style: italic;
    }
    .qna-card-footer.no-ans .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-proc .status-dot { background: #5AAFC8; }
    .card-wait .status-dot { background: #F4A261; }
    .card-done .status-dot { background: #E87FA0; }

    /* 상세 테이블 */
    .qna-table-wrap { width:100%; overflow:hidden; border-radius:10px; border:1px solid rgba(126,200,227,.2); margin-top:1.5vh; box-shadow:0 2px 12px rgba(126,200,227,.1); }
    .qna-table { width:100%; border-collapse:collapse; font-size:clamp(11px,.9vw,13px); }
    .qna-table thead tr { background:rgba(126,200,227,.12); border-bottom:1px solid rgba(126,200,227,.2); }
    .qna-table th { padding:clamp(6px,.9vh,10px) clamp(8px,.9vw,13px); text-align:left; font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#3A8BAD; white-space:nowrap; }
    .qna-table tbody tr { border-bottom:1px solid rgba(126,200,227,.1); }
    .qna-table tbody tr:last-child { border-bottom:none; }
    .qna-table tbody tr:hover { background:rgba(126,200,227,.05); }
    .qna-table td { padding:clamp(5px,.8vh,9px) clamp(8px,.9vw,13px); vertical-align:middle; color:#1E3A5F; }
    .qna-table td.no   { color:rgba(126,200,227,.6); font-size:.9em; }
    .qna-table td.q-c  { max-width:28vw; line-height:1.6; word-break:keep-all; }
    .qna-table td.ans-c{ max-width:20vw; color:rgba(30,58,95,.6); font-style:italic; line-height:1.5; word-break:keep-all; }
    .qna-table td.kw-c { font-size:.85em; color:rgba(30,58,95,.5); line-height:1.6; white-space:nowrap; }
    .qna-table td.date-c{ white-space:nowrap; font-size:.9em; color:rgba(30,58,95,.5); }
    .qna-loading { padding:5vh 0; text-align:center; color:rgba(30,58,95,.4); font-size:clamp(12px,1.2vw,16px); letter-spacing:.1em; }

    /* ============================================================
       THEMES
    ============================================================ */

    /* — dark-neon — 🌤 화이트 + 하늘색 */
    .theme-dark-neon {
      background: #FFFFFF;
      color: #1E3A5F;
    }
    .theme-dark-neon .slide-ghost-num { color: rgba(126,200,227,0.1); }
    .theme-dark-neon .s-tag {
      background: rgba(126,200,227,0.15);
      color: #3A8BAD;
      border: 1px solid rgba(126,200,227,0.35);
      border-radius: 20px;
    }
    .theme-dark-neon .s-badge { border-color: var(--accent-mid); color: var(--accent-mid); }
    .theme-dark-neon .s-subtitle { color: rgba(30,58,95,0.65); }
    .theme-dark-neon .s-body { color: rgba(30,58,95,0.72); }
    .theme-dark-neon .s-divider { background: var(--accent); }
    .theme-dark-neon .intro-item-label { color: #1E3A5F; }
    .theme-dark-neon .intro-item-num { color: var(--accent); }
    .theme-dark-neon .section-group-val { color: #1E3A5F; }
    .theme-dark-neon .section-group-name { color: var(--accent-mid); }
    .theme-dark-neon .culture-grid-label { color: #1E3A5F; }
    .theme-dark-neon .culture-grid-num { color: var(--accent); }
    .theme-dark-neon .title-sub-row .s-subtitle { border-left-color: var(--accent); }

    /* — dark-amber — 🌸 소프트 핑크 + 벚꽃 */
    .theme-dark-amber {
      background: var(--sakura-pale);
      color: #3D1A2E;
    }
    .theme-dark-amber .slide-ghost-num { color: rgba(247,168,196,0.12); }
    .theme-dark-amber .s-tag {
      background: rgba(247,168,196,0.2);
      color: #C05A7E;
      border: 1px solid rgba(247,168,196,0.4);
      border-radius: 20px;
    }
    .theme-dark-amber .s-badge { border-color: var(--sakura-mid); color: var(--sakura-mid); }
    .theme-dark-amber .s-subtitle { color: rgba(61,26,46,0.65); }
    .theme-dark-amber .s-body { color: rgba(61,26,46,0.72); }
    .theme-dark-amber .s-divider { background: var(--sakura); }
    .theme-dark-amber .intro-item-label { color: #3D1A2E; }
    .theme-dark-amber .intro-item-num { color: var(--sakura); }
    .theme-dark-amber .section-group-val { color: #3D1A2E; }
    .theme-dark-amber .section-group-name { color: var(--sakura-mid); }
    .theme-dark-amber .culture-grid-label { color: #3D1A2E; }
    .theme-dark-amber .culture-grid-num { color: var(--sakura); }
    .theme-dark-amber .title-sub-row .s-subtitle { border-left-color: var(--sakura); }

    /* — light-editorial — 💠 연하늘 + 혼합 파스텔 */
    .theme-light-editorial {
      background: var(--sky-pale);
      color: #1E3A5F;
    }
    .theme-light-editorial .slide-ghost-num { color: rgba(126,200,227,0.1); }
    .theme-light-editorial .s-tag {
      background: rgba(247,168,196,0.18);
      color: #C05A7E;
      border: 1px solid rgba(247,168,196,0.35);
      border-radius: 20px;
    }
    .theme-light-editorial .s-badge { border-color: var(--accent-dark); color: var(--accent-dark); }
    .theme-light-editorial .s-subtitle { color: rgba(30,58,95,0.65); }
    .theme-light-editorial .s-body { color: rgba(30,58,95,0.72); }
    .theme-light-editorial .intro-item-label { color: #1E3A5F; }
    .theme-light-editorial .intro-item-desc { color: rgba(30,58,95,0.45); }
    .theme-light-editorial .intro-item-num { color: var(--accent); }
    .theme-light-editorial .section-group-val { color: #1E3A5F; }
    .theme-light-editorial .section-group-name { color: var(--accent-mid); }
    .theme-light-editorial .culture-grid-label { color: #1E3A5F; }
    .theme-light-editorial .culture-grid-desc { color: rgba(30,58,95,0.45); }
    .theme-light-editorial .culture-grid-num { color: var(--sakura); }
    .theme-light-editorial .title-sub-row .s-subtitle { border-left-color: var(--sakura); }
    .theme-light-editorial .s-divider { background: linear-gradient(90deg, var(--accent), var(--sakura)); }
    .theme-light-editorial .s-title { color: #1E3A5F; }

    /* — ax-bright — ✨ 밝고 에너지 있는 테마 (AX 캠페인 전용) */
    .theme-ax-bright {
      background: #f0fdf4;
      color: #0b1220;
    }
    .theme-ax-bright .slide-canvas { display: none; }
    .theme-ax-bright .slide-ghost-num {
      font-weight: 400;
      background: linear-gradient(135deg, rgba(13,204,90,0.12), rgba(139,92,246,0.12));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    /* 배경 블롭 + 그레인 */
    .ax-bg {
      position: absolute; inset: 0; z-index: 0; overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 0%, #fef3c7 0%, transparent 55%),
        radial-gradient(ellipse at 100% 100%, #ddd6fe 0%, transparent 50%),
        linear-gradient(135deg, #f0fdf4 0%, #ecfeff 50%, #fffbeb 100%);
    }
    .ax-blob {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.55; mix-blend-mode: multiply;
      will-change: transform;
    }
    .ax-blob.b1 { width: 52vw; height: 52vw; top: -18vw; left: -14vw; background: #6ee7b7; animation: axBlob1 28s ease-in-out infinite; }
    .ax-blob.b2 { width: 48vw; height: 48vw; top: -10vw; right: -12vw; background: #fcd34d; animation: axBlob2 32s ease-in-out infinite; }

<script>
/* ============================================================
   AX 캠페인 — 데이터 & 매칭 애니메이션
============================================================ */
const AX_ROSTER = [

  { name: '안혜림', task: '모니터링 대시보드 자동화' },

  { name: '이용준', task: '기술 히스토리 자산화' },
  { name: '이진희', task: '경쟁 C2C 플랫폼 정책·서비스 리서치 자동화' },
  { name: '이학준', task: '일일 앱 거래액, 안심결제율 및 우회거래율 대시보드 구축' },
  { name: '전희진', task: '디자인 시스템 신규 구축' },
  { name: '정진영', task: '서비스 법무 검토 사전 체크' },
  { name: '조상현', task: '업무 자동화 : 시스템 환경에서의 트러블슈팅' },
  { name: '채은빈', task: '중고거래 분쟁 판단 및 답변 초안 자동화 시스템 구축' },
];
const AX_COLORS = [
  { base: '#10b981', ring: 'rgba(16,185,129,0.22)', shadow: 'rgba(16,185,129,0.55)' },
  { base: '#f59e0b', ring: 'rgba(245,158,11,0.24)', shadow: 'rgba(245,158,11,0.55)' },
  { base: '#ec4899', ring: 'rgba(236,72,153,0.24)', shadow: 'rgba(236,72,153,0.55)' },
  { base: '#8b5cf6', ring: 'rgba(139,92,246,0.24)', shadow: 'rgba(139,92,246,0.55)' },
  { base: '#3b82f6', ring: 'rgba(59,130,246,0.24)', shadow: 'rgba(59,130,246,0.55)' },
  { base: '#06b6d4', ring: 'rgba(6,182,212,0.24)', shadow: 'rgba(6,182,212,0.55)' },
  { base: '#84cc16', ring: 'rgba(132,204,22,0.24)', shadow: 'rgba(132,204,22,0.55)' },
  { base: '#fb7185', ring: 'rgba(251,113,133,0.24)', shadow: 'rgba(251,113,133,0.55)' },
];
const AX_PAIRS_PER_VIEW = 4;

let axMatchTimer = null;
let axDeck = [];
let axDeckIdx = 0;
let axCycleSeq = 0;

function axShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* roster(과제 있는 사람)만 필터링하여 매칭 번호 붙여 덱으로 준비 */
function axBuildDeck(roster) {
  const withTask = roster.filter(r => r && r.task);
  let n = 0;
  const decorated = withTask.map(r => ({
    name: r.name,
    task: r.task,
    _num: ++n,
  }));
  return axShuffle(decorated);
}

function axNextChunk() {
  if (!axDeck.length) return { chunk: [] };
  if (axDeckIdx + AX_PAIRS_PER_VIEW > axDeck.length) {
    // 덱 소진 → 다시 섞기
    const currentSlide = slides[current] || {};
    const roster = (Array.isArray(currentSlide.roster) && currentSlide.roster.length)
      ? currentSlide.roster : AX_ROSTER;
    axDeck = axBuildDeck(roster);
    axDeckIdx = 0;
  }
  const chunk = axDeck.slice(axDeckIdx, axDeckIdx + AX_PAIRS_PER_VIEW);
  axDeckIdx += AX_PAIRS_PER_VIEW;
  return { chunk };
}

function axBuildRows(listEl, chunk) {
  listEl.innerHTML = '';
  chunk.forEach((item, i) => {
    const color = AX_COLORS[i % AX_COLORS.length];
    const row = document.createElement('div');
    row.className = 'ax-pair-row';
    row.style.setProperty('--pair-color', color.base);
    row.style.setProperty('--pair-ring', color.ring);
    row.style.setProperty('--pair-shadow', color.shadow);

    const numHtml  = String(item._num).padStart(2,'0');
    const taskHtml = item.task;

    row.innerHTML =
      `<div class="ax-pair-name">${item.name}</div>` +
      `<div class="ax-pair-connector"><div class="line"></div><div class="arrow"></div></div>` +
      `<div class="ax-pair-task">` +
        `<div class="ax-pair-task-num">${numHtml}</div>` +
        `<div class="ax-pair-task-text">${taskHtml}</div>` +
      `</div>`;
    listEl.appendChild(row);
  });
}

function axAnimateCycle() {
  const listEl = document.querySelector('.slide.active [data-ax-pair-list]');
  if (!listEl) return;
  const seq = ++axCycleSeq;
  const { chunk } = axNextChunk();
  if (!chunk.length) return;
  axBuildRows(listEl, chunk);
  const rows = Array.from(listEl.querySelectorAll('.ax-pair-row'));
  rows.forEach((row, i) => {
    setTimeout(() => { if (seq !== axCycleSeq) return; row.classList.add('show'); }, 80 + i * 160);
    setTimeout(() => { if (seq !== axCycleSeq) return; row.classList.add('matched'); }, 80 + i * 160 + 700);
  });
}

function startAxMatch() {
  stopAxMatch();
  const currentSlide = slides[current] || {};
  const roster = (Array.isArray(currentSlide.roster) && currentSlide.roster.length)
    ? currentSlide.roster : AX_ROSTER;
  axDeck = axBuildDeck(roster);
  axDeckIdx = 0;
  axAnimateCycle();
  axMatchTimer = setInterval(axAnimateCycle, 4800);
}

function stopAxMatch() {
  if (axMatchTimer) { clearInterval(axMatchTimer); axMatchTimer = null; }
  axCycleSeq++;
  document.querySelectorAll('[data-ax-pair-list]').forEach(el => { el.innerHTML = ''; });
}

function initWithData(data) {
  slides = data.slides || [];
  cfg = Object.assign(cfg, data.config || {});
  if (cfg.accentColor) {
    document.documentElement.style.setProperty('--accent', cfg.accentColor);
  }
  buildSlides();
  buildDots();
  goTo(0, false);
  if (playing) resumeAll();
  showUI();
  // QnA 슬라이드가 있으면 데이터 fetch
  if (slides.some(s => s.type === 'qna-dashboard' || s.type === 'qna-detail')) {
    fetchQnaData();
  }
}

fetch('slides.json')
  .then(r => { if (!r.ok) throw new Error('not ok'); return r.json(); })
  .then(data => initWithData(data))
  .catch(() => {
    // file:// 환경이거나 slides.json 없으면 내장 데이터 사용
    initWithData(FALLBACK);
  });

/* ============================================================
   BUILD SLIDES
============================================================ */
function buildSlides() {
  const sw = document.getElementById('slideshow');
  sw.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    const isQna = s.type === 'qna-dashboard' || s.type === 'qna-detail';
    const typeCls = s.type ? ` slide-type-${s.type}` : '';
    el.className = `slide theme-${s.theme || 'dark-neon'}${isQna ? ' qna-slide' : ''}${typeCls}`;
    el.dataset.i = i;
    el.dataset.type = s.type || '';

    // ax-bright 테마 전용 — 배경 블롭 + 그레인
    if ((s.theme || '') === 'ax-bright') {
      const bg = document.createElement('div');
      bg.className = 'ax-bg';
      bg.innerHTML =
        '<div class="ax-blob b1"></div>' +
        '<div class="ax-blob b2"></div>' +
        '<div class="ax-blob b3"></div>' +
        '<div class="ax-blob b4"></div>';
      el.appendChild(bg);
      const grain = document.createElement('div');
      grain.className = 'ax-grain';
      el.appendChild(grain);
    }

    // canvas
    const cv = document.createElement('canvas');
    cv.className = 'slide-canvas';
    cv.id = `cv${i}`;
    el.appendChild(cv);

    // ghost number
    const gn = document.createElement('div');
    gn.className = 'slide-ghost-num';
    gn.textContent = String(i + 1).padStart(2, '0');
    el.appendChild(gn);

    // content
    const cnt = document.createElement('div');
    cnt.className = 'slide-content';
    cnt.innerHTML = renderSlide(s);
    el.appendChild(cnt);

    el.addEventListener('click', togglePlay);
    sw.appendChild(el);
  });
}

function renderSlide(s) {
  const type = s.type || 'default';
  const nl = t => (t || '').replace(/\n/g, '<br>');
  let h = '';

  const tag    = s.tag    ? `<div class="s-el s-tag">${s.tag}</div>` : '';
  const badge  = s.badge  ? `<div class="s-el s-badge">${s.badge}</div>` : '';
  const title  = s.title  ? `<div class="s-el s-title">${nl(s.title)}</div>` : '';
  const sub    = s.subtitle ? `<div class="s-el s-subtitle">${nl(s.subtitle)}</div>` : '';
  // title + subtitle 가로 배치 (way / culture-item 전용)
  const titleSubRow = s.title && s.subtitle
    ? `<div class="s-el title-sub-row">
        <div class="s-title">${nl(s.title)}</div>
        <div class="s-subtitle">${nl(s.subtitle)}</div>
       </div>`
    : (s.title ? title : '');
  const div    = `<div class="s-el s-divider"></div>`;
  const body   = s.body   ? `<div class="s-el s-body">${nl(s.body)}</div>` : '';

  // __텍스트__ → <em> 강조 변환
  const hl = t => (t || '').replace(/__([^_]+)__/g, '<em>$1</em>').replace(/\n/g, '<br>');

  if (type === 'mission') {
    const titleHtml = hl(s.title);
    const transHtml = s.translate
      ? `<div class="s-el mission-translate">
           <span class="translate-label">한 줄 번역</span>
           <span class="translate-text">${nl(s.translate)}</span>
         </div>`
      : '';
    h = tag + `<div class="s-el s-divider"></div>` +
        `<div class="s-el mission-title">${titleHtml}</div>` +
        transHtml;

  } else if (type === 'vision') {
    const titleHtml = hl(s.title);
    const transHtml = s.translate
      ? `<div class="s-el vision-translate">
           <span class="translate-label">한 줄 번역</span>
           <span class="translate-text">${nl(s.translate)}</span>
         </div>`
      : '';
    h = tag + `<div class="s-el s-divider"></div>` +
        `<div class="s-el vision-title">${titleHtml}</div>` +
        transHtml;

  } else if (type === 'context') {
    const titleHtml = hl(s.title);
    h = `<div class="s-el context-title">${titleHtml}</div>`;

  } else if (type === 'intro') {
    h = tag + title + div + body;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="intro-item">
          <div class="intro-item-num">${it.number}</div>
          <div class="intro-item-label">${it.label}</div>
          <div class="intro-item-desc">${it.desc}</div>
        </div>`).join('');
      h += `<div class="s-el intro-items">${items}</div>`;
    }

  } else if (type === 'value') {
    h = badge + tag + title + div + body;

  } else if (type === 'section') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const groups = s.items.map(g => `
        <div>
          <div class="section-group-name">${g.group}</div>
          <div class="section-group-values">
            ${g.values.map(v => `<div class="section-group-val">${v}</div>`).join('')}
          </div>
        </div>`).join('');
      h += `<div class="s-el section-groups">${groups}</div>`;
    }

  } else if (type === 'way') {
    h = badge + tag + titleSubRow + div + body;

  } else if (type === 'culture-intro') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="culture-grid-item">
          <div class="culture-grid-num">${it.number}</div>
          <div class="culture-grid-text">
            <div class="culture-grid-desc">${it.desc}</div>
            <div class="culture-grid-label">${it.label}</div>
          </div>
        </div>`).join('');
      h += `<div class="s-el culture-grid">${items}</div>`;
    }

  } else if (type === 'culture-item') {
    h = badge + tag + titleSubRow + div + body;

  } else if (type === 'ax-title') {
    h = `<div class="s-el ax-main-title">중고나라<br>`
      + `<span class="ax-pop">AX 캠페인</span><br>`
      + `진행중<span class="ax-dots" data-ax-dots="1"></span></div>`
      + `<div class="s-el ax-title-divider"></div>`;

  } else if (type === 'ax-match') {
    const axKicker   = s.kicker   || 'AI Challenge';
    const axHeadline = s.headline || '__AI 수용성__을 높이는,\n중고나라 AI 챌린지';
    h = `<div class="s-el ax-kicker">${axKicker}</div>`
      + `<div class="s-el ax-match-headline"><h2>${hl(axHeadline)}</h2></div>`
      + `<div class="s-el ax-pair-list" data-ax-pair-list="1"></div>`;

  } else if (type === 'qna-dashboard') {
    // 동적 데이터 — 나중에 updateQnaSlides()로 채워짐
    h = tag + title + div + `<div class="qna-container s-el"><div class="qna-loading">데이터 불러오는 중…</div></div>`;

  } else if (type === 'qna-detail') {
    h = tag + title + div + `<div class="qna-container s-el"><div class="qna-loading">데이터 불러오는 중…</div></div>`;

  } else {
    h = (tag || badge) + title + div + body;
  }

  return h;
}

/* ============================================================
   DOTS
============================================================ */
function buildDots() {
  const dc = document.getElementById('dots');
  dc.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', e => { e.stopPropagation(); goTo(i); });
    dc.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function updateCounter() {
  document.getElementById('slide-counter').textContent =
    `${String(current + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
}

/* ============================================================
   NAVIGATION
============================================================ */
function goTo(idx, animate = true) {
  const all = document.querySelectorAll('.slide');

  // Clear previous
  all.forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.s-el').forEach(el => el.classList.remove('in'));
  });

  stopCanvas(current);

  // 이전 슬라이드가 ax-match였다면 매칭 루프 정지
  if (slides[current] && slides[current].type === 'ax-match') stopAxMatch();

  current = ((idx % slides.length) + slides.length) % slides.length;
  const el = all[current];
  el.classList.add('active');

  // Staggered entrance
  const els = el.querySelectorAll('.s-el');
  els.forEach((e, i) => {
    setTimeout(() => e.classList.add('in'), 120 + i * 200);
  });

  updateDots();
  updateCounter();
  startCanvas(current);

  // 새 슬라이드가 ax-match라면 진입 애니메이션 이후 매칭 루프 시작
  if (slides[current] && slides[current].type === 'ax-match') {
    setTimeout(startAxMatch, 900);
  }

  if (animate) {
    resetProgress();
    if (playing) restartSlideTimer();
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

/* ============================================================
   PLAY / PAUSE
============================================================ */
function togglePlay(e) {
  if (e) e.stopPropagation();
  playing ? pauseAll() : resumeAll();
}

function resumeAll() {
  playing = true;
  document.getElementById('btn-play').innerHTML = '⏸';
  document.getElementById('pause-overlay').classList.remove('show');
  progressTick = Date.now();
  startProgressRAF();
  restartSlideTimer();
}

function pauseAll() {
  playing = false;
  document.getElementById('btn-play').innerHTML = '▶';
  document.getElementById('pause-overlay').classList.add('show');
  progressOffset += Date.now() - progressTick;
  clearTimeout(slideTimerID);
  cancelAnimationFrame(progressRAF);
}

/* ============================================================
   SLIDE TIMER
============================================================ */
function restartSlideTimer() {
  clearTimeout(slideTimerID);
  const remaining = DURATION() - progressOffset;
  slideTimerID = setTimeout(() => {
    if (playing) next();
  }, Math.max(remaining, 0));
}

/* ============================================================
   PROGRESS BAR
============================================================ */
function resetProgress() {
  progressOffset = 0;
  progressTick = Date.now();
  document.getElementById('progress-bar').style.width = '0%';
}

function startProgressRAF() {
  cancelAnimationFrame(progressRAF);
  const bar = document.getElementById('progress-bar');
  function tick() {
    if (!playing) return;
    const elapsed = progressOffset + (Date.now() - progressTick);
    const pct = Math.min(elapsed / DURATION() * 100, 100);
    bar.style.width = pct + '%';
    progressRAF = requestAnimationFrame(tick);
  }
  progressRAF = requestAnimationFrame(tick);
}

/* ============================================================
   UI AUTO-HIDE
============================================================ */
function showUI() {
  document.getElementById('ui').classList.remove('ui-hidden');
  document.getElementById('cursor').classList.remove('ui-hidden');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    if (playing) {
      document.getElementById('ui').classList.add('ui-hidden');
      document.getElementById('cursor').classList.add('ui-hidden');
    }
  }, 3000);
}

document.addEventListener('mousemove', showUI);
document.addEventListener('keydown', showUI);

/* ============================================================
   CUSTOM CURSOR
============================================================ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowRight': next(); break;
    case 'ArrowLeft':  prev(); break;
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'f': case 'F':
      toggleFullscreen();
      break;
  }
});

/* ============================================================
   BUTTONS
============================================================ */
document.getElementById('btn-prev').addEventListener('click', e => { e.stopPropagation(); prev(); });
document.getElementById('btn-next').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('btn-play').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
document.getElementById('btn-fullscreen').addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });

/* ============================================================
   FULLSCREEN
============================================================ */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

/* ============================================================
   CANVAS BACKGROUND ANIMATIONS
============================================================ */
function startCanvas(idx) {
  const slide = slides[idx];
  if (!slide) return;
  const cv = document.getElementById(`cv${idx}`);
  if (!cv) return;

  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const theme = slide.theme || 'dark-neon';
  let rafID;

  if (theme === 'dark-green') {
    /* dark-green: 딥 블랙 위 그린 파티클 + 희미한 그리드 라인 */
    const pts = Array.from({ length: 50 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.28, vy: (Math.random() - 0.5) * 0.28,
      r: Math.random() * 1.4 + 0.3,
      ph: Math.random() * Math.PI * 2,
    }));

    function drawGreen() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#141313';
      ctx.fillRect(0, 0, W, H);

      const t = Date.now() / 1000;

      // 우상단 그린 glow
      const gr = ctx.createRadialGradient(W * 0.85, H * 0.1, 0, W * 0.85, H * 0.1, W * 0.5);
      const ga = 0.07 + 0.03 * Math.sin(t * 0.5);
      gr.addColorStop(0, `rgba(13,204,90,${ga})`);
      gr.addColorStop(1, 'rgba(13,204,90,0)');
      ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);

      // 좌하단 보조 glow
      const gr2 = ctx.createRadialGradient(W * 0.08, H * 0.88, 0, W * 0.08, H * 0.88, W * 0.38);
      const ga2 = 0.04 + 0.02 * Math.sin(t * 0.38 + 1.2);
      gr2.addColorStop(0, `rgba(13,204,90,${ga2})`);
      gr2.addColorStop(1, 'rgba(13,204,90,0)');
      ctx.fillStyle = gr2; ctx.fillRect(0, 0, W, H);

      // 파티클
      pts.forEach(p => {
        p.ph += 0.01;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const a = 0.15 + 0.2 * Math.sin(p.ph);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(13,204,90,${a})`;
        ctx.fill();
      });

      // 연결선
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 110) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(13,204,90,${0.07 * (1 - d / 110)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      rafID = requestAnimationFrame(drawGreen);
    }
    drawGreen();

  } else if (theme === 'dark-neon') {
    /* dark-neon: 새싹 파티클 네트워크 — 딥 포레스트 위 연두빛 별빛 */
    const pts = Array.from({ length: 65 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.6 + 0.4,
      ph: Math.random() * Math.PI * 2,
      type: Math.random() > 0.6 ? 1 : 0   /* 0=dot, 1=tiny leaf shimmer */
    }));

    function drawNeon() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 1000;

      // 상단 우측 — 새싹 그린 + 옥빛 glow
      const gr = ctx.createRadialGradient(W * 0.78, H * 0.14, 0, W * 0.78, H * 0.14, W * 0.55);
      const ga = 0.06 + 0.03 * Math.sin(t * 0.6);
      gr.addColorStop(0, `rgba(161,228,208,${ga})`);       /* soft jade */
      gr.addColorStop(0.45, `rgba(196,243,189,${ga * 0.5})`); /* sprout green */
      gr.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);

      // 좌하단 — 따뜻한 햇살 glow
      const gr2 = ctx.createRadialGradient(W * 0.05, H * 0.9, 0, W * 0.05, H * 0.9, W * 0.4);
      const ga2 = 0.04 + 0.02 * Math.sin(t * 0.4 + 1);
      gr2.addColorStop(0, `rgba(196,243,189,${ga2})`);
      gr2.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr2; ctx.fillRect(0, 0, W, H);

      // 파티클
      pts.forEach(p => {
        p.ph += 0.012;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const a = 0.18 + 0.22 * Math.sin(p.ph);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.type ? `rgba(161,228,208,${a})` : `rgba(196,243,189,${a})`;
        ctx.fill();
      });

      // 연결선
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 115) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(196,243,189,${0.08 * (1 - d / 115)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      rafID = requestAnimationFrame(drawNeon);
    }
    drawNeon();

  } else if (theme === 'dark-amber') {
    /* dark-amber: 이끼 그리드 + 햇살 glow */
    function drawGrid() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 5000;
      const ox = Math.sin(t) * 22; const oy = Math.cos(t * 0.8) * 16;
      const gs = 68;

      ctx.strokeStyle = 'rgba(196,243,189,0.055)';
      ctx.lineWidth = 1;
      for (let x = (ox % gs) - gs; x < W + gs; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = (oy % gs) - gs; y < H + gs; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // 좌하단 — 새싹 glow
      const t2 = Date.now() / 1000;
      const a2 = 0.05 + 0.025 * Math.sin(t2 * 0.55);
      const gr2 = ctx.createRadialGradient(W * 0.1, H * 0.87, 0, W * 0.1, H * 0.87, W * 0.52);
      gr2.addColorStop(0, `rgba(196,243,189,${a2 * 1.8})`);
      gr2.addColorStop(0.5, `rgba(161,228,208,${a2 * 0.8})`);
      gr2.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr2; ctx.fillRect(0, 0, W, H);

      // 우상단 — 옥빛 보조 glow
      const a3 = 0.03 + 0.015 * Math.sin(t2 * 0.4 + 2);
      const gr3 = ctx.createRadialGradient(W * 0.9, H * 0.1, 0, W * 0.9, H * 0.1, W * 0.4);
      gr3.addColorStop(0, `rgba(161,228,208,${a3})`);
      gr3.addColorStop(1, 'rgba(161,228,208,0)');
      ctx.fillStyle = gr3; ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawGrid);
    }
    drawGrid();

  } else if (theme === 'light-editorial') {
    /* light-editorial: 크림 위 봄비 도트 물결 + 연두 glow */
    let t = 0;
    function drawLight() {
      ctx.clearRect(0, 0, W, H);
      t += 0.004;
      const sp = 46;
      for (let x = sp; x < W; x += sp) {
        for (let y = sp; y < H; y += sp) {
          const dist = Math.hypot(x - W * 0.75, y - H * 0.25);
          const wave = Math.sin(dist * 0.013 - t * 1.6) * 0.5 + 0.5;
          const a = 0.04 + wave * 0.13;
          ctx.beginPath();
          ctx.arc(x, y, 1.3, 0, Math.PI * 2);
          /* 거리에 따라 sprout ↔ jade 색 전환 */
          const blend = Math.min(dist / (W * 0.6), 1);
          const r = Math.round(196 + (161-196)*blend);
          const g = Math.round(243 + (228-243)*blend);
          const b = Math.round(189 + (208-189)*blend);
          ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
          ctx.fill();
        }
      }
      // 우상단 — 연두 햇살 glow
      const a4 = 0.06 + 0.03 * Math.sin(t * 0.85);
      const gr4 = ctx.createRadialGradient(W*0.88, H*0.1, 0, W*0.88, H*0.1, W*0.48);
      gr4.addColorStop(0, `rgba(196,243,189,${a4})`);
      gr4.addColorStop(0.5, `rgba(224,242,241,${a4 * 0.5})`);  /* sky blue tint */
      gr4.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr4; ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawLight);
    }
    drawLight();
  }

  canvasHandles[idx] = { cancel: () => cancelAnimationFrame(rafID) };
}

function stopCanvas(idx) {
  if (canvasHandles[idx]) {
    canvasHandles[idx].cancel();
    delete canvasHandles[idx];
  }
}

/* ── QnA 전역 데이터 ── */
let qnaRows = [];

/* ── CSV 파서 (RFC 4180 — 셀 내 줄바꿈 완전 지원) ── */
function parseCSV(text) {
  const rows = [];
  let i = 0;
  const n = text.length;
  let isHeader = true;

  while (i < n) {
    const row = [];

    // 한 행 파싱
    while (i < n) {
      let field = '';
      if (i < n && text[i] === '"') {
        i++; // 여는 따옴표 건너뜀
        while (i < n) {
          if (text[i] === '"') {
            if (i + 1 < n && text[i + 1] === '"') { field += '"'; i += 2; } // "" → "
            else { i++; break; } // 닫는 따옴표
          } else {
            field += text[i++]; // 셀 내 \n 포함 그대로 수집
          }
        }
      } else {
        while (i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          field += text[i++];
        }
      }
      row.push(field.trim());

      if (i < n && text[i] === ',') { i++; continue; } // 다음 필드
      // 행 끝 처리
      if (i < n && text[i] === '\r') i++;
      if (i < n && text[i] === '\n') i++;
      break;
    }

    if (isHeader) { isHeader = false; continue; } // 헤더 행 스킵
    if (row.every(c => !c)) continue;              // 빈 행 스킵
    rows.push(row);
  }
  return rows;
}
function gc(row, key) {
  const val = (row[QNA.COL[key]] || '').trim();
  // 구글폼 특수문자·공백 정규화
  return val.replace(/\u00A0/g, ' ').replace(/\s+/g, ' ').trim();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 상태 정규화 (시트 입력값 → 표준 텍스트, 부분 포함 방식) ── */
function normStatus(raw) {
  if (!raw) return '';
  const s = raw.trim();
  if (/완료/.test(s) || /done/i.test(s))    return QNA.ST.DONE;
  if (/진행/.test(s) || /proc/i.test(s) || /progress/i.test(s)) return QNA.ST.PROC;
  if (/대기/.test(s) || /wait/i.test(s))    return QNA.ST.WAIT;
  return s;
}

/* ── 상태 배지 HTML ── */
function statusBadge(raw) {
  const s = normStatus(raw);
  const cls = s===QNA.ST.WAIT?'wait': s===QNA.ST.PROC?'proc': s===QNA.ST.DONE?'done':'cat';
  const icon = s===QNA.ST.WAIT?'🕐 ': s===QNA.ST.PROC?'⚡ ': s===QNA.ST.DONE?'✅ ':'';
  return `<span class="qna-badge qna-badge-${cls}">${icon}${esc(s||'?')}</span>`;
}

/* ── 대시보드 슬라이드 HTML 빌드 ── */
function buildDashboardHTML(rows) {
  const total = rows.length;
  const wait  = rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.WAIT).length;
  const proc  = rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.PROC).length;
  const done  = rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.DONE).length;

  const stats = `
    <div class="qna-stats">
      <div class="qna-stat">
        <div class="qna-stat-val">${total}</div>
        <div class="qna-stat-label">전체</div>
      </div>
      <div class="qna-stat-sep"></div>
      <div class="qna-stat">
        <div class="qna-stat-val wait">${wait}</div>
        <div class="qna-stat-label">대기</div>
      </div>
      <div class="qna-stat">
        <div class="qna-stat-val proc">${proc}</div>
        <div class="qna-stat-label">진행중</div>
      </div>
      <div class="qna-stat">
        <div class="qna-stat-val done">${done}</div>
        <div class="qna-stat-label">완료</div>
      </div>
    </div>`;

  // 1순위: 진행중(최신순) → 2순위: 대기(최신순) → 3순위: 완료(최신순)
  const sortByDateDesc = arr => [...arr].sort((a,b) => {
    const toMs = ts => {
      if (!ts) return 0; ts = ts.trim();
      if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(ts)) return new Date(ts.replace(/\//g,'-')).getTime();
      if (/^\d{1,2}\/\d{1,2}$/.test(ts)) { const [m,d]=ts.split('/'); return new Date(`${new Date().getFullYear()}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`).getTime(); }
      return new Date(ts).getTime()||0;
    };
    return toMs(gc(b,'TIMESTAMP'))-toMs(gc(a,'TIMESTAMP'));
  });
  const priority = [
    ...sortByDateDesc(rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.PROC)),
    ...sortByDateDesc(rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.WAIT)),
    ...sortByDateDesc(rows.filter(r => normStatus(gc(r,'STATUS'))===QNA.ST.DONE)),
  ].slice(0, QNA.CARD_LIMIT);

  const cards = priority.map(row => {
    const cat = gc(row,'CATEGORY');
    const q   = gc(row,'QUESTION');
    const st  = gc(row,'STATUS');
    const ans = gc(row,'ANSWER');
    const ns  = normStatus(st);
    const fmtA = t => esc(t).replace(/\s*-\s+/g, '<br>• ').replace(/^• /, '');

    // 상태별 카드 클래스
    const cardCls = ns===QNA.ST.PROC?'card-proc': ns===QNA.ST.WAIT?'card-wait': ns===QNA.ST.DONE?'card-done':'';

    // 답변 footer — 있으면 내용, 없으면 상태 힌트
    const footerHtml = ans
      ? `<div class="qna-card-footer has-ans">${fmtA(ans)}</div>`
      : `<div class="qna-card-footer no-ans">
           <span class="status-dot"></span>
           ${ns===QNA.ST.PROC?'검토 진행중':ns===QNA.ST.WAIT?'접수 완료, 검토 예정':'답변 준비중'}
         </div>`;

    return `
      <div class="qna-card ${cardCls}">
        <div>
          <div class="qna-card-top">
            ${cat ? `<span class="qna-badge qna-badge-cat">${esc(cat)}</span>` : ''}
            ${statusBadge(st)}
          </div>
          <div class="qna-card-q">${esc(q)||'—'}</div>
        </div>
        ${footerHtml}
      </div>`;
  }).join('');

  return stats + `<div class="qna-cards">${cards || '<div class="qna-loading">등록된 질문이 없어요</div>'}</div>`;
}

/* ── 상세 슬라이드 HTML 빌드 ── */
function buildDetailHTML(rows) {
  if (!rows.length) return '<div class="qna-loading">등록된 질문이 없어요</div>';

  // 날짜: 이미 M/DD 형식이면 그대로, 아니면 파싱
  const fmtDate = ts => {
    if (!ts) return '—';
    ts = ts.trim();
    if (/^\d{1,2}\/\d{1,2}$/.test(ts)) return ts;          // 2/23, 02/23
    if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(ts)) {    // 2026/04/01 등
      const p = ts.split(/[\/\-]/);
      return `${parseInt(p[1])}/${parseInt(p[2])}`;
    }
    const d = new Date(ts);
    return isNaN(d) ? ts : `${d.getMonth()+1}/${d.getDate()}`;
  };

  // '-' 기호 → 줄바꿈 bullet 처리
  const fmtCell = t => {
    if (!t) return '';
    return esc(t).replace(/\s*-\s+/g, '<br>• ').replace(/^• /, '');
  };

  // 1순위: 진행중(최신순) → 2순위: 대기(최신순) → 3순위: 완료(최신순)
  const toMs = ts => {
    if (!ts) return 0;
    ts = ts.trim();
    if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(ts)) return new Date(ts.replace(/\//g,'-')).getTime();
    if (/^\d{1,2}\/\d{1,2}$/.test(ts)) {
      const [m,d] = ts.split('/');
      return new Date(`${new Date().getFullYear()}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`).getTime();
    }
    return new Date(ts).getTime() || 0;
  };
  const byDate = arr => [...arr].sort((a,b) => toMs(gc(b,'TIMESTAMP')) - toMs(gc(a,'TIMESTAMP')));
  const sorted = [
    ...byDate(rows.filter(r => normStatus(gc(r,'STATUS')) === QNA.ST.PROC)),
    ...byDate(rows.filter(r => normStatus(gc(r,'STATUS')) === QNA.ST.WAIT)),
    ...byDate(rows.filter(r => normStatus(gc(r,'STATUS')) === QNA.ST.DONE)),
  ];

  const trs = sorted.map((row, i) => {
    const ts  = gc(row,'TIMESTAMP');
    const cat = gc(row,'CATEGORY');
    const q   = gc(row,'QUESTION');
    const kw  = gc(row,'KEYWORD');
    const st  = gc(row,'STATUS');
    const ans = gc(row,'ANSWER');
    return `<tr>
      <td class="date-c">${fmtDate(ts)}</td>
      <td>${cat ? `<span class="qna-badge qna-badge-cat">${esc(cat)}</span>` : '—'}</td>
      <td class="q-c">${fmtCell(q)||'—'}</td>
      <td class="kw-c">${kw ? esc(kw).replace(/,/g,'<br>') : '—'}</td>
      <td>${statusBadge(normStatus(st))}</td>
      <td class="ans-c">${ans ? fmtCell(ans) : '<span style="opacity:.35;font-style:italic">미답변</span>'}</td>
    </tr>`;
  }).join('');

  return `
    <div class="qna-table-wrap">
      <table class="qna-table">
        <thead><tr>
          <th>접수일</th><th>카테고리</th><th>질문</th><th>키워드</th><th>진행상황</th><th>답변</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
}

/* ── QnA 슬라이드 DOM 업데이트 ── */
function updateQnaSlides() {
  document.querySelectorAll('.slide').forEach((el, idx) => {
    const type = slides[idx] && slides[idx].type;
    const container = el.querySelector('.qna-container');
    if (!container) return;

    if (type === 'qna-dashboard') {
      container.innerHTML = buildDashboardHTML(qnaRows);
    } else if (type === 'qna-detail') {
      container.innerHTML = buildDetailHTML(qnaRows);
    }
  });
}

/* ── 데이터 fetch ── */
async function fetchQnaData() {
  try {
    const url = QNA.CSV_URL + (QNA.CSV_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length) {
      qnaRows = rows;
      // 🐛 디버그: 브라우저 콘솔에서 컬럼 확인용
      console.group('[QnA] 파싱 결과 (첫 3행)');
      rows.slice(0,3).forEach((r,i) => {
        console.log(`row[${i}]:`, r.map((v,ci) => `[${ci}]${v}`).join(' | '));
      });
      console.log('[QnA] STATUS col(' + QNA.COL.STATUS + ') 값 목록:', [...new Set(rows.map(r=>r[QNA.COL.STATUS]||'').slice(0,10))]);
      console.groupEnd();
      updateQnaSlides();
    }
  } catch (e) {
    console.warn('[QnA] 데이터 fetch 실패 (로컬 환경):', e.message);
    // file:// 로컬에서는 fetch 불가 → 샘플 데이터로 미리보기
    if (!qnaRows.length) {
      qnaRows = QNA_SAMPLE;
      updateQnaSlides();
      console.info('[QnA] 샘플 데이터로 미리보기 중 — GitHub Pages 배포 후 실데이터 연결됩니다');
    }
  }
}

/* ── 자동 새로고침 (initWithData에서 첫 fetch 호출) ── */
setInterval(fetchQnaData, QNA.REFRESH_MS);
</script>
