<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드쇼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --duration: 15;
      --accent: #0dcc5a;
      --font-display: 'Bebas Neue', cursive;
      --font-body: 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: none;
      background: #050a0f;
      font-family: var(--font-body);
    }

    /* ============================================================
       CUSTOM CURSOR
    ============================================================ */
    #cursor {
      position: fixed;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, opacity 0.4s ease;
      will-change: transform;
    }
    #cursor.clicking { width: 44px; height: 44px; }
    #cursor.ui-hidden { opacity: 0; }

    /* ============================================================
       SLIDESHOW WRAPPER
    ============================================================ */
    #slideshow {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ============================================================
       SLIDE BASE
    ============================================================ */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
      overflow: hidden;
    }
    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Background canvas */
    .slide-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* Large ghost number */
    .slide-ghost-num {
      position: absolute;
      right: 6vw;
      bottom: 8vh;
      font-family: var(--font-display);
      font-size: clamp(100px, 20vw, 280px);
      line-height: 1;
      pointer-events: none;
      z-index: 1;
      user-select: none;
    }

    /* ============================================================
       SLIDE CONTENT AREA
    ============================================================ */
    .slide-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 7vh 10vw;
    }

    /* ============================================================
       STAGGER ANIMATION
    ============================================================ */
    .s-el {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .slide.active .s-el.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================================
       SHARED TYPOGRAPHY
    ============================================================ */
    .s-tag {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 2px;
      margin-bottom: 2.2vh;
      display: inline-block;
    }

    .s-badge {
      font-size: clamp(10px, 1vw, 12px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 2vh;
      display: inline-block;
    }

    .s-title {
      font-size: clamp(44px, 7.5vw, 108px);
      font-weight: 900;
      line-height: 1.02;
      margin-bottom: 2.5vh;
      white-space: pre-line;
    }

    .s-subtitle {
      font-family: var(--font-body);
      font-size: clamp(29px, 5vw, 72px);
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    /* title + subtitle 가로 배치 (way / culture-item 전용) */
    .title-sub-row {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 56px);
      margin-bottom: 2.8vh;
      flex-wrap: wrap;
    }
    .title-sub-row .s-title { margin-bottom: 0; }
    .title-sub-row .s-subtitle {
      padding-left: 1.6vw;
      border-left: 3px solid var(--accent);
    }

    .s-divider {
      width: 56px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 3vh;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .s-body {
      font-size: clamp(15px, 1.7vw, 24px);
      font-weight: 300;
      line-height: 1.85;
      white-space: pre-line;
      max-width: 65vw;
    }

    /* ============================================================
       INTRO TYPE — items row
    ============================================================ */
    .intro-items {
      display: flex;
      gap: clamp(28px, 5vw, 80px);
      margin-top: 4vh;
      flex-wrap: wrap;
    }
    .intro-item { display: flex; flex-direction: column; gap: 4px; }
    .intro-item-num {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 76px);
      color: var(--accent);
      line-height: 1;
    }
    .intro-item-label {
      font-size: clamp(16px, 2.1vw, 30px);
      font-weight: 700;
    }
    .intro-item-desc {
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 300;
      opacity: 0.6;
    }

    /* ============================================================
       SECTION TYPE — grouped values
    ============================================================ */
    .section-groups {
      display: flex;
      flex-direction: column;
      gap: 4vh;
      margin-top: 4vh;
    }
    .section-group-name {
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2vh;
    }
    .section-group-values {
      display: flex;
      gap: clamp(16px, 3vw, 48px);
      flex-wrap: wrap;
    }
    .section-group-val {
      font-size: clamp(22px, 3.2vw, 50px);
      font-weight: 700;
    }

    /* ============================================================
       CULTURE INTRO TYPE — 2×2 grid
    ============================================================ */
    .culture-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3.5vh 6vw;
      margin-top: 4vh;
    }
    .culture-grid-item {
      display: flex;
      align-items: flex-start;
      gap: 1.8vw;
    }
    .culture-grid-num {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 64px);
      color: var(--accent);
      line-height: 1;
      min-width: 2ch;
    }
    .culture-grid-text {}
    .culture-grid-desc {
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 300;
      opacity: 0.55;
      margin-bottom: 0.3vh;
    }
    .culture-grid-label {
      font-size: clamp(16px, 2vw, 30px);
      font-weight: 700;
    }

    /* ============================================================
       THEMES
    ============================================================ */

    /* — dark-neon — 미드나잇 블루 */
    .theme-dark-neon {
      background: #0d1526;
      color: #fff;
    }
    .theme-dark-neon .slide-ghost-num { color: rgba(13,204,90,0.06); }
    .theme-dark-neon .s-tag {
      background: rgba(13,204,90,0.12);
      color: var(--accent);
      border: 1px solid rgba(13,204,90,0.3);
    }
    .theme-dark-neon .s-subtitle { color: rgba(255,255,255,0.65); }
    .theme-dark-neon .s-body { color: rgba(255,255,255,0.78); }
    .theme-dark-neon .intro-item-label { color: #fff; }
    .theme-dark-neon .section-group-val { color: #fff; }
    .theme-dark-neon .culture-grid-label { color: #fff; }

    /* — dark-amber — 쿨 네이비 슬레이트 */
    .theme-dark-amber {
      background: #111a2e;
      color: #fff;
    }
    .theme-dark-amber .slide-ghost-num { color: rgba(255,255,255,0.04); }
    .theme-dark-amber .s-tag {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .theme-dark-amber .s-subtitle { color: rgba(255,255,255,0.88); }
    .theme-dark-amber .s-body { color: rgba(255,255,255,0.88); }
    .theme-dark-amber .intro-item-label { color: #fff; }
    .theme-dark-amber .section-group-val { color: #fff; }
    .theme-dark-amber .culture-grid-label { color: #fff; }

    /* — light-editorial — 순백 */
    .theme-light-editorial {
      background: #ffffff;
      color: #0d1020;
    }
    .theme-light-editorial .slide-ghost-num { color: rgba(0,0,0,0.05); }
    .theme-light-editorial .s-tag {
      background: rgba(13,204,90,0.08);
      color: rgba(0,0,0,0.55);
      border: 1px solid rgba(13,204,90,0.2);
    }
    .theme-light-editorial .s-subtitle { color: rgba(0,0,0,0.75); }
    .theme-light-editorial .s-body { color: rgba(0,0,0,0.75); }
    .theme-light-editorial .intro-item-label { color: #0d1020; }
    .theme-light-editorial .intro-item-desc { color: rgba(0,0,0,0.5); }
    .theme-light-editorial .section-group-val { color: #0d1020; }
    .theme-light-editorial .culture-grid-label { color: #0d1020; }
    .theme-light-editorial .culture-grid-desc { color: rgba(0,0,0,0.45); }

    /* ============================================================
       UI LAYER
    ============================================================ */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #ui.ui-hidden { opacity: 0; }

    /* Progress bar */
    #progress-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(128,128,128,0.18);
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: none;
    }

    /* Slide counter */
    #slide-counter {
      position: absolute;
      top: 26px; right: 88px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
    }

    /* Fullscreen button */
    #btn-fullscreen {
      position: absolute;
      top: 18px; right: 28px;
      width: 42px; height: 42px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: rgba(255,255,255,0.65);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      transition: background 0.2s, color 0.2s;
    }
    #btn-fullscreen:hover { background: rgba(13,204,90,0.2); color: #fff; }

    /* Controls row */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: all;
    }

    .ctrl-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .ctrl-btn:hover { background: rgba(13,204,90,0.28); }
    .ctrl-btn:active { transform: scale(0.92); }

    /* Dot nav */
    #dots {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      cursor: pointer;
      transition: background 0.25s, width 0.3s, border-radius 0.3s;
      pointer-events: all;
    }
    .dot.active {
      background: var(--accent);
      width: 22px;
      border-radius: 4px;
      box-shadow: 0 0 6px var(--accent);
    }

    /* Pause overlay */
    #pause-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 76px; height: 76px;
      border-radius: 50%;
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #pause-overlay.show { opacity: 1; }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="slideshow"></div>

<div id="ui">
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="slide-counter">01 / 01</div>
  <button id="btn-fullscreen" title="전체화면 (F)">⛶</button>
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev" title="이전 (←)">&#8592;</button>
    <div id="dots"></div>
    <button class="ctrl-btn" id="btn-play" title="재생/일시정지 (Space)">⏸</button>
    <button class="ctrl-btn" id="btn-next" title="다음 (→)">&#8594;</button>
  </div>
  <div id="pause-overlay">▶</div>
</div>

<script>
/* ============================================================
   STATE
============================================================ */
let slides = [];
let cfg = { duration: 15, accentColor: '#0dcc5a' };
let current = 0;
let playing = true;

let slideTimerID = null;
let progressRAF = null;
let progressOffset = 0;   // ms accumulated before last pause
let progressTick = 0;     // Date.now() at last resume

let uiTimer = null;
let canvasHandles = {};   // index → { raf, cancel }

const DURATION = () => (cfg.duration || 15) * 1000;

/* ============================================================
   EMBEDDED FALLBACK DATA (file:// 로컬 실행용)
   — slides.json 수정 후 GitHub Pages에 올리면 자동 반영됨
   — 로컬에서 바로 열 때는 아래 데이터를 사용
============================================================ */
const FALLBACK = {"config":{"duration":15,"accentColor":"#0dcc5a"},"slides":[{"id":1,"theme":"dark-neon","type":"intro","tag":"일을 대하는 태도","title":"핵심가치 3가지","body":"일과 업무의 판단 기준이 모호할 때,\n이 3가지 가치를 기준으로 판단합니다","items":[{"number":"01","label":"고객가치","desc":"유저를 위한"},{"number":"02","label":"혁신","desc":"더 나은 답"},{"number":"03","label":"신뢰","desc":"있는 그대로"}]},{"id":2,"theme":"dark-amber","type":"value","tag":"핵심가치 01","title":"유저를 위한","badge":"고객가치","body":"우리의 모든 '일'은\n유저를 위한 가치로 연결됩니다"},{"id":3,"theme":"light-editorial","type":"value","tag":"핵심가치 02","title":"더 나은 답","badge":"혁신","body":"원래 그런 것은 없습니다.\n더 나은 답은 항상 있습니다"},{"id":4,"theme":"dark-amber","type":"value","tag":"핵심가치 03","title":"있는 그대로","badge":"신뢰","body":"정보는 있는 그대로 투명하게 공유합니다.\n결정되면 결정을 신뢰합니다"},{"id":5,"theme":"dark-neon","type":"section","tag":"동료를 대하는 태도 / 문제를 대하는 태도","title":"일하는방식 5가지","items":[{"group":"동료를 대하는 태도","values":["진정성","협업"]},{"group":"문제를 대하는 태도","values":["문제해결","빠른실행","책임감"]}]},{"id":6,"theme":"light-editorial","type":"way","tag":"일하는방식 01","title":"진정성","subtitle":"투명하고, 솔직하게","badge":"동료를 대하는 태도","body":"우리는 상호존중을 기반으로 일하며,\n회사를 위해서 숨기지 않고,\n솔직하게 말합니다"},{"id":7,"theme":"dark-amber","type":"way","tag":"일하는방식 02","title":"협업","subtitle":"함께, 성장하기","badge":"동료를 대하는 태도","body":"우리는 혼자가 아닌,\n함께 일하며 성장합니다"},{"id":8,"theme":"light-editorial","type":"way","tag":"일하는방식 03","title":"문제해결","subtitle":"발견하고, 해결하기","badge":"문제를 대하는 태도","body":"문제는 문제를 '발견하는 순간'부터 시작합니다.\n우리는 문제를 숨기지 않고,\n함께 해결합니다"},{"id":9,"theme":"dark-amber","type":"way","tag":"일하는방식 04","title":"빠른실행","subtitle":"작고, 빠르게","badge":"문제를 대하는 태도","body":"우리는 작게 시도하고,\n빠르게 검증합니다"},{"id":10,"theme":"light-editorial","type":"way","tag":"일하는방식 05","title":"책임감","subtitle":"주도적으로, 마무리까지","badge":"문제를 대하는 태도","body":"우리는 내가 시작한 일은 책임지고,\n끝까지 마무리합니다"},{"id":11,"theme":"dark-neon","type":"culture-intro","tag":"조직문화","title":"조직문화 1.0\n환경설정","items":[{"number":"1","desc":"진정성 있는 소통을 위한","label":"'님' 문화"},{"number":"2","desc":"투명한 소통을 위한","label":"안심톡"},{"number":"3","desc":"우리의 관계 형성을 위한","label":"랜덤런치"},{"number":"4","desc":"업무 효율을 높이기 위한","label":"코어워킹"}]},{"id":12,"theme":"dark-amber","type":"culture-item","tag":"조직문화 01","title":"'님' 문화","subtitle":"인욱'님'이라 불러주세요","badge":"진정성 있는 소통","body":"상호 존중을 바탕으로,\n눈치 보지 않고 명확하게\n사실과 의견을 나눕니다"},{"id":13,"theme":"light-editorial","type":"culture-item","tag":"조직문화 02","title":"안심톡","subtitle":"회사를 위한 개선 의견을 보내주세요!","badge":"투명한 소통","body":"누구나 자유롭게 묻고 제안하는 공간,\n명확하고 투명한 피드백을 약속합니다"},{"id":14,"theme":"dark-amber","type":"culture-item","tag":"조직문화 03","title":"랜덤런치","subtitle":"평소 이야기 나누지 못 한 동료와 함께!","badge":"관계 형성","body":"자유롭게 소통하고,\n여러 구성원과 관계를 맺어보세요!"},{"id":15,"theme":"light-editorial","type":"culture-item","tag":"조직문화 04","title":"코어워킹","subtitle":"업무에 더 집중하여 실행의 속도를 올려보세요!","badge":"업무 효율","body":"코어워킹 시간에는 No Meeting, No Slack\n매주 월요일 10:10 ~ 12:10\n동료의 시간을 존중하고 배려해주세요"}]};

/* ============================================================
   FETCH & INIT
============================================================ */
function initWithData(data) {
  slides = data.slides || [];
  cfg = Object.assign(cfg, data.config || {});
  if (cfg.accentColor) {
    document.documentElement.style.setProperty('--accent', cfg.accentColor);
  }
  buildSlides();
  buildDots();
  goTo(0, false);
  if (playing) resumeAll();
  showUI();
}

fetch('slides.json')
  .then(r => { if (!r.ok) throw new Error('not ok'); return r.json(); })
  .then(data => initWithData(data))
  .catch(() => {
    // file:// 환경이거나 slides.json 없으면 내장 데이터 사용
    initWithData(FALLBACK);
  });

/* ============================================================
   BUILD SLIDES
============================================================ */
function buildSlides() {
  const sw = document.getElementById('slideshow');
  sw.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = `slide theme-${s.theme || 'dark-neon'}`;
    el.dataset.i = i;

    // canvas
    const cv = document.createElement('canvas');
    cv.className = 'slide-canvas';
    cv.id = `cv${i}`;
    el.appendChild(cv);

    // ghost number
    const gn = document.createElement('div');
    gn.className = 'slide-ghost-num';
    gn.textContent = String(i + 1).padStart(2, '0');
    el.appendChild(gn);

    // content
    const cnt = document.createElement('div');
    cnt.className = 'slide-content';
    cnt.innerHTML = renderSlide(s);
    el.appendChild(cnt);

    el.addEventListener('click', togglePlay);
    sw.appendChild(el);
  });
}

function renderSlide(s) {
  const type = s.type || 'default';
  const nl = t => (t || '').replace(/\n/g, '<br>');
  let h = '';

  const tag    = s.tag    ? `<div class="s-el s-tag">${s.tag}</div>` : '';
  const badge  = s.badge  ? `<div class="s-el s-badge">${s.badge}</div>` : '';
  const title  = s.title  ? `<div class="s-el s-title">${nl(s.title)}</div>` : '';
  const sub    = s.subtitle ? `<div class="s-el s-subtitle">${nl(s.subtitle)}</div>` : '';
  // title + subtitle 가로 배치 (way / culture-item 전용)
  const titleSubRow = s.title && s.subtitle
    ? `<div class="s-el title-sub-row">
        <div class="s-title">${nl(s.title)}</div>
        <div class="s-subtitle">${nl(s.subtitle)}</div>
       </div>`
    : (s.title ? title : '');
  const div    = `<div class="s-el s-divider"></div>`;
  const body   = s.body   ? `<div class="s-el s-body">${nl(s.body)}</div>` : '';

  if (type === 'intro') {
    h = tag + title + div + body;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="intro-item">
          <div class="intro-item-num">${it.number}</div>
          <div class="intro-item-label">${it.label}</div>
          <div class="intro-item-desc">${it.desc}</div>
        </div>`).join('');
      h += `<div class="s-el intro-items">${items}</div>`;
    }

  } else if (type === 'value') {
    h = badge + tag + title + div + body;

  } else if (type === 'section') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const groups = s.items.map(g => `
        <div>
          <div class="section-group-name">${g.group}</div>
          <div class="section-group-values">
            ${g.values.map(v => `<div class="section-group-val">${v}</div>`).join('')}
          </div>
        </div>`).join('');
      h += `<div class="s-el section-groups">${groups}</div>`;
    }

  } else if (type === 'way') {
    h = badge + tag + titleSubRow + div + body;

  } else if (type === 'culture-intro') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="culture-grid-item">
          <div class="culture-grid-num">${it.number}</div>
          <div class="culture-grid-text">
            <div class="culture-grid-desc">${it.desc}</div>
            <div class="culture-grid-label">${it.label}</div>
          </div>
        </div>`).join('');
      h += `<div class="s-el culture-grid">${items}</div>`;
    }

  } else if (type === 'culture-item') {
    h = badge + tag + titleSubRow + div + body;

  } else {
    h = (tag || badge) + title + div + body;
  }

  return h;
}

/* ============================================================
   DOTS
============================================================ */
function buildDots() {
  const dc = document.getElementById('dots');
  dc.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', e => { e.stopPropagation(); goTo(i); });
    dc.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function updateCounter() {
  document.getElementById('slide-counter').textContent =
    `${String(current + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
}

/* ============================================================
   NAVIGATION
============================================================ */
function goTo(idx, animate = true) {
  const all = document.querySelectorAll('.slide');

  // Clear previous
  all.forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.s-el').forEach(el => el.classList.remove('in'));
  });

  stopCanvas(current);

  current = ((idx % slides.length) + slides.length) % slides.length;
  const el = all[current];
  el.classList.add('active');

  // Staggered entrance
  const els = el.querySelectorAll('.s-el');
  els.forEach((e, i) => {
    setTimeout(() => e.classList.add('in'), 120 + i * 200);
  });

  updateDots();
  updateCounter();
  startCanvas(current);

  if (animate) {
    resetProgress();
    if (playing) restartSlideTimer();
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

/* ============================================================
   PLAY / PAUSE
============================================================ */
function togglePlay(e) {
  if (e) e.stopPropagation();
  playing ? pauseAll() : resumeAll();
}

function resumeAll() {
  playing = true;
  document.getElementById('btn-play').innerHTML = '⏸';
  document.getElementById('pause-overlay').classList.remove('show');
  progressTick = Date.now();
  startProgressRAF();
  restartSlideTimer();
}

function pauseAll() {
  playing = false;
  document.getElementById('btn-play').innerHTML = '▶';
  document.getElementById('pause-overlay').classList.add('show');
  progressOffset += Date.now() - progressTick;
  clearTimeout(slideTimerID);
  cancelAnimationFrame(progressRAF);
}

/* ============================================================
   SLIDE TIMER
============================================================ */
function restartSlideTimer() {
  clearTimeout(slideTimerID);
  const remaining = DURATION() - progressOffset;
  slideTimerID = setTimeout(() => {
    if (playing) next();
  }, Math.max(remaining, 0));
}

/* ============================================================
   PROGRESS BAR
============================================================ */
function resetProgress() {
  progressOffset = 0;
  progressTick = Date.now();
  document.getElementById('progress-bar').style.width = '0%';
}

function startProgressRAF() {
  cancelAnimationFrame(progressRAF);
  const bar = document.getElementById('progress-bar');
  function tick() {
    if (!playing) return;
    const elapsed = progressOffset + (Date.now() - progressTick);
    const pct = Math.min(elapsed / DURATION() * 100, 100);
    bar.style.width = pct + '%';
    progressRAF = requestAnimationFrame(tick);
  }
  progressRAF = requestAnimationFrame(tick);
}

/* ============================================================
   UI AUTO-HIDE
============================================================ */
function showUI() {
  document.getElementById('ui').classList.remove('ui-hidden');
  document.getElementById('cursor').classList.remove('ui-hidden');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    if (playing) {
      document.getElementById('ui').classList.add('ui-hidden');
      document.getElementById('cursor').classList.add('ui-hidden');
    }
  }, 3000);
}

document.addEventListener('mousemove', showUI);
document.addEventListener('keydown', showUI);

/* ============================================================
   CUSTOM CURSOR
============================================================ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowRight': next(); break;
    case 'ArrowLeft':  prev(); break;
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'f': case 'F':
      toggleFullscreen();
      break;
  }
});

/* ============================================================
   BUTTONS
============================================================ */
document.getElementById('btn-prev').addEventListener('click', e => { e.stopPropagation(); prev(); });
document.getElementById('btn-next').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('btn-play').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
document.getElementById('btn-fullscreen').addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });

/* ============================================================
   FULLSCREEN
============================================================ */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

/* ============================================================
   CANVAS BACKGROUND ANIMATIONS
============================================================ */
function startCanvas(idx) {
  const slide = slides[idx];
  if (!slide) return;
  const cv = document.getElementById(`cv${idx}`);
  if (!cv) return;

  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const theme = slide.theme || 'dark-neon';
  let rafID;

  if (theme === 'dark-neon') {
    /* Particle network — 미드나잇 블루 위 밝은 파티클 */
    const pts = Array.from({ length: 70 }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r:  Math.random() * 1.5 + 0.5,
      ph: Math.random() * Math.PI * 2
    }));

    function drawNeon() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 1000;

      // 상단 우측 — 밝고 넓은 블루 glow
      const gr = ctx.createRadialGradient(W * 0.75, H * 0.15, 0, W * 0.75, H * 0.15, W * 0.55);
      const ga = 0.05 + 0.025 * Math.sin(t * 0.7);
      gr.addColorStop(0, `rgba(80,140,255,${ga})`);
      gr.addColorStop(0.5, `rgba(13,204,90,${ga * 0.6})`);
      gr.addColorStop(1, 'rgba(13,204,90,0)');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, H);

      // Particles
      pts.forEach(p => {
        p.ph += 0.015;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const a = 0.2 + 0.2 * Math.sin(p.ph);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(13,204,90,${a})`;
        ctx.fill();
      });

      // Connections
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(13,204,90,${0.1 * (1 - d / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      rafID = requestAnimationFrame(drawNeon);
    }
    drawNeon();

  } else if (theme === 'dark-amber') {
    /* 네이비 위 밝은 그리드 + 블루 glow */
    function drawGrid() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 5000;
      const ox = Math.sin(t) * 25;
      const oy = Math.cos(t * 0.8) * 18;
      const gs = 70;

      ctx.strokeStyle = 'rgba(100,140,255,0.06)';
      ctx.lineWidth = 1;
      for (let x = (ox % gs) - gs; x < W + gs; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = (oy % gs) - gs; y < H + gs; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // 좌하단 — 그린 glow
      const t2 = Date.now() / 1000;
      const a2 = 0.04 + 0.02 * Math.sin(t2 * 0.6);
      const gr2 = ctx.createRadialGradient(W * 0.1, H * 0.88, 0, W * 0.1, H * 0.88, W * 0.55);
      gr2.addColorStop(0, `rgba(13,204,90,${a2 * 2})`);
      gr2.addColorStop(1, 'rgba(13,204,90,0)');
      ctx.fillStyle = gr2;
      ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawGrid);
    }
    drawGrid();

  } else if (theme === 'light-editorial') {
    /* 화이트 위 섬세한 도트 — 더 밝고 선명하게 */
    let t = 0;
    function drawLight() {
      ctx.clearRect(0, 0, W, H);
      t += 0.005;
      const sp = 48;
      for (let x = sp; x < W; x += sp) {
        for (let y = sp; y < H; y += sp) {
          const dist = Math.hypot(x - W * 0.8, y - H * 0.2);
          const wave = Math.sin(dist * 0.014 - t * 1.8) * 0.5 + 0.5;
          const a = 0.06 + wave * 0.14;
          ctx.beginPath();
          ctx.arc(x, y, 1.2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(13,204,90,${a})`;
          ctx.fill();
        }
      }
      // 우상단 — 연한 그린 glow
      const a3 = 0.05 + 0.025 * Math.sin(t * 0.9);
      const gr3 = ctx.createRadialGradient(W * 0.88, H * 0.1, 0, W * 0.88, H * 0.1, W * 0.5);
      gr3.addColorStop(0, `rgba(13,204,90,${a3})`);
      gr3.addColorStop(1, 'rgba(13,204,90,0)');
      ctx.fillStyle = gr3;
      ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawLight);
    }
    drawLight();
  }

  canvasHandles[idx] = { cancel: () => cancelAnimationFrame(rafID) };
}

function stopCanvas(idx) {
  if (canvasHandles[idx]) {
    canvasHandles[idx].cancel();
    delete canvasHandles[idx];
  }
}

/* ============================================================
   RESIZE
============================================================ */
window.addEventListener('resize', () => {
  const cv = document.getElementById(`cv${current}`);
  if (cv) {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
});
</script>
