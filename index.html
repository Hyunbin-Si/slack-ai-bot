<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슬라이드쇼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --duration: 15;
      /* 🌸 파스텔 팔레트 — 하늘색 + 벚꽃 */
      --accent:      #7EC8E3;   /* sky blue */
      --accent-mid:  #5AAFC8;   /* deeper sky */
      --accent-dark: #1E3A5F;   /* dark navy text */
      --sakura:      #F7A8C4;   /* cherry blossom */
      --sakura-mid:  #E87FA0;   /* deeper sakura */
      --sky-pale:    #EBF7FD;   /* pale sky bg */
      --sakura-pale: #FFF0F6;   /* pale sakura bg */
      --bg-cream:    #FFFFFF;   /* pure white */
      --font-display: 'Bebas Neue', cursive;
      --font-body: 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: none;
      background: var(--bg-cream);
      font-family: var(--font-body);
    }

    /* ============================================================
       CUSTOM CURSOR
    ============================================================ */
    #cursor {
      position: fixed;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, opacity 0.4s ease;
      will-change: transform;
    }
    #cursor.clicking { width: 44px; height: 44px; }
    #cursor.ui-hidden { opacity: 0; }

    /* ============================================================
       SLIDESHOW WRAPPER
    ============================================================ */
    #slideshow {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ============================================================
       SLIDE BASE
    ============================================================ */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
      overflow: hidden;
    }
    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Background canvas */
    .slide-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* Large ghost number */
    .slide-ghost-num {
      position: absolute;
      right: 6vw;
      bottom: 8vh;
      font-family: var(--font-display);
      font-size: clamp(100px, 20vw, 280px);
      line-height: 1;
      pointer-events: none;
      z-index: 1;
      user-select: none;
    }

    /* ============================================================
       SLIDE CONTENT AREA
    ============================================================ */
    .slide-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 7vh 10vw;
    }

    /* ============================================================
       STAGGER ANIMATION — 꽃봉오리 자라나듯 (grow-up)
    ============================================================ */
    .s-el {
      opacity: 0;
      transform: translateY(22px) scale(0.97);
      transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .slide.active .s-el.in {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ============================================================
       SHARED TYPOGRAPHY
    ============================================================ */
    .s-tag {
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;       /* 둥근 pill 형태 */
      margin-bottom: 2.2vh;
      display: inline-block;
    }

    .s-badge {
      font-size: clamp(10px, 1vw, 12px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1.5px solid var(--accent-mid);
      color: var(--accent-mid);
      padding: 4px 14px;
      border-radius: 20px;       /* 둥근 pill 형태 */
      margin-bottom: 2vh;
      display: inline-block;
      backdrop-filter: blur(6px);
    }

    .s-title {
      font-size: clamp(44px, 7.5vw, 108px);
      font-weight: 900;
      line-height: 1.02;
      margin-bottom: 2.5vh;
      white-space: pre-line;
    }

    .s-subtitle {
      font-family: var(--font-body);
      font-size: min(4vw, 58px);   /* 이전 대비 20% 축소 + 한 줄 유지 */
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.3;
      white-space: nowrap;
    }

    /* title + subtitle 가로 배치 (way / culture-item 전용) */
    .title-sub-row {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2vw, 48px);
      margin-bottom: 2.8vh;
      flex-wrap: nowrap;            /* 행 자체도 절대 줄바꿈 안 함 */
      min-width: 0;
    }
    .title-sub-row .s-title {
      margin-bottom: 0;
      white-space: nowrap;
      flex-shrink: 0;               /* 타이틀은 크기 고정 */
    }
    .title-sub-row .s-subtitle {
      padding-left: 1.4vw;
      border-left: 3px solid var(--accent);
      min-width: 0;
    }

    .s-divider {
      width: 56px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 3vh;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .s-body {
      font-size: clamp(15px, 1.7vw, 24px);
      font-weight: 300;
      line-height: 1.85;
      white-space: pre-line;
      max-width: 65vw;
    }

    /* ============================================================
       INTRO TYPE — items row
    ============================================================ */
    .intro-items {
      display: flex;
      gap: clamp(28px, 5vw, 80px);
      margin-top: 4vh;
      flex-wrap: wrap;
    }
    .intro-item { display: flex; flex-direction: column; gap: 4px; }
    .intro-item-num {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 76px);
      color: var(--accent);
      line-height: 1;
    }
    .intro-item-label {
      font-size: clamp(16px, 2.1vw, 30px);
      font-weight: 700;
    }
    .intro-item-desc {
      font-size: clamp(11px, 1.1vw, 15px);
      font-weight: 300;
      opacity: 0.6;
    }

    /* ============================================================
       SECTION TYPE — grouped values
    ============================================================ */
    .section-groups {
      display: flex;
      flex-direction: column;
      gap: 4vh;
      margin-top: 4vh;
    }
    .section-group-name {
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2vh;
    }
    .section-group-values {
      display: flex;
      gap: clamp(16px, 3vw, 48px);
      flex-wrap: wrap;
    }
    .section-group-val {
      font-size: clamp(22px, 3.2vw, 50px);
      font-weight: 700;
    }

    /* ============================================================
       CULTURE INTRO TYPE — 2×2 grid
    ============================================================ */
    .culture-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3.5vh 6vw;
      margin-top: 4vh;
    }
    .culture-grid-item {
      display: flex;
      align-items: flex-start;
      gap: 1.8vw;
    }
    .culture-grid-num {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 64px);
      color: var(--accent);
      line-height: 1;
      min-width: 2ch;
    }
    .culture-grid-text {}
    .culture-grid-desc {
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 300;
      opacity: 0.55;
      margin-bottom: 0.3vh;
    }
    .culture-grid-label {
      font-size: clamp(16px, 2vw, 30px);
      font-weight: 700;
    }

    /* ============================================================
       QnA SLIDE STYLES
    ============================================================ */
    .qna-container { width:100%; display:flex; flex-direction:column; overflow:hidden; }

    /* QnA 타이틀 축소 (더 많은 콘텐츠 노출) */
    .theme-dark-neon.qna-slide .s-title,
    .theme-dark-amber.qna-slide .s-title { font-size: clamp(28px,3.5vw,52px) !important; margin-bottom:1.2vh !important; }
    .theme-dark-neon.qna-slide .s-tag,
    .theme-dark-amber.qna-slide .s-tag   { margin-bottom:1vh !important; }
    .theme-dark-neon.qna-slide .s-divider,
    .theme-dark-amber.qna-slide .s-divider { margin-bottom:1.5vh !important; }

    /* 통계 줄 */
    .qna-stats { display:flex; align-items:center; gap:clamp(16px,3vw,48px); margin-bottom:2vh; flex-wrap:wrap; }
    .qna-stat  { display:flex; flex-direction:column; gap:2px; }
    .qna-stat-val {
      font-family: var(--font-display);
      font-size: clamp(30px,4vw,62px); line-height:1;
      color: var(--accent);
    }
    .qna-stat-val.wait { color:#F4A261; }
    .qna-stat-val.proc { color:#5AAFC8; }
    .qna-stat-val.done { color:#E87FA0; }
    .qna-stat-label { font-size:clamp(9px,0.8vw,11px); font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:rgba(30,58,95,.5); }
    .qna-stat-sep   { width:1px; height:clamp(24px,3.5vh,44px); background:rgba(126,200,227,.25); align-self:center; }

    /* 카드 그리드 */
    .qna-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(6px,1vh,12px) clamp(8px,1.2vw,18px); width:100%; }
    .qna-card {
      background:#FFFFFF; border:1px solid rgba(126,200,227,.25);
      border-radius:10px; padding:clamp(8px,1.2vh,14px) clamp(10px,1vw,16px);
      display:flex; flex-direction:column; gap:5px; min-width:0;
      box-shadow: 0 2px 10px rgba(126,200,227,0.1);
    }
    .qna-card-top { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .qna-badge { font-size:clamp(9px,.75vw,11px); font-weight:600; padding:2px 8px; border-radius:20px; white-space:nowrap; }
    .qna-badge-cat  { background:rgba(126,200,227,.15); color:#3A8BAD; border:1px solid rgba(126,200,227,.3); }
    .qna-badge-wait { background:rgba(244,162,97,.12);  color:#D4762A; border:1px solid rgba(244,162,97,.3); }
    .qna-badge-proc { background:rgba(90,175,200,.12);  color:#3A8BAD; border:1px solid rgba(90,175,200,.3); }
    .qna-badge-done { background:rgba(247,168,196,.15); color:#C05A7E; border:1px solid rgba(247,168,196,.35); }
    .qna-card-q   { font-size:clamp(12px,1.05vw,15px); font-weight:600; line-height:1.4; color:#1E3A5F; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .qna-card-ans { font-size:clamp(10px,.85vw,12px); color:rgba(30,58,95,.5); line-height:1.4; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; font-style:italic; }

    /* 상세 테이블 */
    .qna-table-wrap { width:100%; overflow:hidden; border-radius:10px; border:1px solid rgba(126,200,227,.2); margin-top:1.5vh; box-shadow:0 2px 12px rgba(126,200,227,.1); }
    .qna-table { width:100%; border-collapse:collapse; font-size:clamp(11px,.9vw,13px); }
    .qna-table thead tr { background:rgba(126,200,227,.12); border-bottom:1px solid rgba(126,200,227,.2); }
    .qna-table th { padding:clamp(6px,.9vh,10px) clamp(8px,.9vw,13px); text-align:left; font-size:clamp(9px,.72vw,11px); font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#3A8BAD; white-space:nowrap; }
    .qna-table tbody tr { border-bottom:1px solid rgba(126,200,227,.1); }
    .qna-table tbody tr:last-child { border-bottom:none; }
    .qna-table tbody tr:hover { background:rgba(126,200,227,.05); }
    .qna-table td { padding:clamp(5px,.8vh,9px) clamp(8px,.9vw,13px); vertical-align:middle; color:#1E3A5F; }
    .qna-table td.no   { color:rgba(126,200,227,.6); font-size:.9em; }
    .qna-table td.q-c  { max-width:24vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qna-table td.ans-c{ max-width:18vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:rgba(30,58,95,.55); font-style:italic; }
    .qna-table td.date-c{ white-space:nowrap; font-size:.9em; color:rgba(30,58,95,.5); }
    .qna-loading { padding:5vh 0; text-align:center; color:rgba(30,58,95,.4); font-size:clamp(12px,1.2vw,16px); letter-spacing:.1em; }

    /* ============================================================
       THEMES
    ============================================================ */

    /* — dark-neon — 🌤 화이트 + 하늘색 */
    .theme-dark-neon {
      background: #FFFFFF;
      color: #1E3A5F;
    }
    .theme-dark-neon .slide-ghost-num { color: rgba(126,200,227,0.1); }
    .theme-dark-neon .s-tag {
      background: rgba(126,200,227,0.15);
      color: #3A8BAD;
      border: 1px solid rgba(126,200,227,0.35);
      border-radius: 20px;
    }
    .theme-dark-neon .s-badge { border-color: var(--accent-mid); color: var(--accent-mid); }
    .theme-dark-neon .s-subtitle { color: rgba(30,58,95,0.65); }
    .theme-dark-neon .s-body { color: rgba(30,58,95,0.72); }
    .theme-dark-neon .s-divider { background: var(--accent); }
    .theme-dark-neon .intro-item-label { color: #1E3A5F; }
    .theme-dark-neon .intro-item-num { color: var(--accent); }
    .theme-dark-neon .section-group-val { color: #1E3A5F; }
    .theme-dark-neon .section-group-name { color: var(--accent-mid); }
    .theme-dark-neon .culture-grid-label { color: #1E3A5F; }
    .theme-dark-neon .culture-grid-num { color: var(--accent); }
    .theme-dark-neon .title-sub-row .s-subtitle { border-left-color: var(--accent); }

    /* — dark-amber — 🌸 소프트 핑크 + 벚꽃 */
    .theme-dark-amber {
      background: var(--sakura-pale);
      color: #3D1A2E;
    }
    .theme-dark-amber .slide-ghost-num { color: rgba(247,168,196,0.12); }
    .theme-dark-amber .s-tag {
      background: rgba(247,168,196,0.2);
      color: #C05A7E;
      border: 1px solid rgba(247,168,196,0.4);
      border-radius: 20px;
    }
    .theme-dark-amber .s-badge { border-color: var(--sakura-mid); color: var(--sakura-mid); }
    .theme-dark-amber .s-subtitle { color: rgba(61,26,46,0.65); }
    .theme-dark-amber .s-body { color: rgba(61,26,46,0.72); }
    .theme-dark-amber .s-divider { background: var(--sakura); }
    .theme-dark-amber .intro-item-label { color: #3D1A2E; }
    .theme-dark-amber .intro-item-num { color: var(--sakura); }
    .theme-dark-amber .section-group-val { color: #3D1A2E; }
    .theme-dark-amber .section-group-name { color: var(--sakura-mid); }
    .theme-dark-amber .culture-grid-label { color: #3D1A2E; }
    .theme-dark-amber .culture-grid-num { color: var(--sakura); }
    .theme-dark-amber .title-sub-row .s-subtitle { border-left-color: var(--sakura); }

    /* — light-editorial — 💠 연하늘 + 혼합 파스텔 */
    .theme-light-editorial {
      background: var(--sky-pale);
      color: #1E3A5F;
    }
    .theme-light-editorial .slide-ghost-num { color: rgba(126,200,227,0.1); }
    .theme-light-editorial .s-tag {
      background: rgba(247,168,196,0.18);
      color: #C05A7E;
      border: 1px solid rgba(247,168,196,0.35);
      border-radius: 20px;
    }
    .theme-light-editorial .s-badge { border-color: var(--accent-dark); color: var(--accent-dark); }
    .theme-light-editorial .s-subtitle { color: rgba(30,58,95,0.65); }
    .theme-light-editorial .s-body { color: rgba(30,58,95,0.72); }
    .theme-light-editorial .intro-item-label { color: #1E3A5F; }
    .theme-light-editorial .intro-item-desc { color: rgba(30,58,95,0.45); }
    .theme-light-editorial .intro-item-num { color: var(--accent); }
    .theme-light-editorial .section-group-val { color: #1E3A5F; }
    .theme-light-editorial .section-group-name { color: var(--accent-mid); }
    .theme-light-editorial .culture-grid-label { color: #1E3A5F; }
    .theme-light-editorial .culture-grid-desc { color: rgba(30,58,95,0.45); }
    .theme-light-editorial .culture-grid-num { color: var(--sakura); }
    .theme-light-editorial .title-sub-row .s-subtitle { border-left-color: var(--sakura); }
    .theme-light-editorial .s-divider { background: linear-gradient(90deg, var(--accent), var(--sakura)); }
    .theme-light-editorial .s-title { color: #1E3A5F; }

    /* ============================================================
       UI LAYER
    ============================================================ */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #ui.ui-hidden { opacity: 0; }

    /* Progress bar */
    #progress-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(128,128,128,0.18);
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--sakura));
      box-shadow: 0 0 10px rgba(126,200,227,0.4);
      transition: none;
    }

    /* Slide counter */
    #slide-counter {
      position: absolute;
      top: 26px; right: 88px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
    }

    /* Fullscreen button */
    #btn-fullscreen {
      position: absolute;
      top: 18px; right: 28px;
      width: 42px; height: 42px;
      background: rgba(126,200,227,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(126,200,227,0.3);
      border-radius: 14px;
      color: rgba(30,58,95,0.7);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      transition: background 0.2s, transform 0.15s;
    }
    #btn-fullscreen:hover {
      background: rgba(126,200,227,0.28);
      transform: scale(1.05);
    }

    /* Controls row */
    #controls {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: all;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(126,200,227,0.25);
      border-radius: 40px;
      padding: 8px 16px;
      box-shadow: 0 4px 20px rgba(126,200,227,0.15);
    }

    .ctrl-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(126,200,227,0.12);
      border: 1px solid rgba(126,200,227,0.25);
      color: rgba(30,58,95,0.8);
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .ctrl-btn:hover {
      background: rgba(126,200,227,0.25);
      transform: scale(1.08);
      box-shadow: 0 0 10px rgba(126,200,227,0.3);
    }
    .ctrl-btn:active { transform: scale(0.94); }

    /* Dot nav */
    #dots {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(126,200,227,0.3);
      cursor: pointer;
      transition: background 0.25s, width 0.3s, border-radius 0.3s;
      pointer-events: all;
    }
    .dot.active {
      background: var(--accent);
      width: 22px;
      border-radius: 4px;
      box-shadow: 0 0 8px rgba(126,200,227,0.5);
    }

    /* Pause overlay */
    #pause-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 76px; height: 76px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(126,200,227,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: #1E3A5F;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #pause-overlay.show { opacity: 1; }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="slideshow"></div>

<div id="ui">
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="slide-counter">01 / 01</div>
  <button id="btn-fullscreen" title="전체화면 (F)">⛶</button>
  <div id="controls">

const DURATION = () => ((slides[current] && slides[current].duration) || cfg.duration || 15) * 1000;

const FALLBACK = {"config":{"duration":15,"accentColor":"#0dcc5a"},"slides":[{"id":1,"theme":"dark-neon","type":"intro","tag":"일을 대하는 태도","title":"핵심가치 3가지","body":"일과 업무의 판단 기준이 모호할 때,\n이 3가지 가치를 기준으로 판단합니다","items":[{"number":"01","label":"고객가치","desc":"유저를 위한"},{"number":"02","label":"혁신","desc":"더 나은 답"},{"number":"03","label":"신뢰","desc":"있는 그대로"}]},{"id":2,"theme":"dark-neon","type":"value","tag":"핵심가치 01","title":"유저를 위한","badge":"고객가치","body":"우리의 모든 '일'은\n유저를 위한 가치로 연결됩니다"},{"id":3,"theme":"dark-neon","type":"value","tag":"핵심가치 02","title":"더 나은 답","badge":"혁신","body":"원래 그런 것은 없습니다.\n더 나은 답은 항상 있습니다"},{"id":4,"theme":"dark-neon","type":"value","tag":"핵심가치 03","title":"있는 그대로","badge":"신뢰","body":"정보는 있는 그대로 투명하게 공유합니다.\n결정되면 결정을 신뢰합니다"},{"id":5,"theme":"dark-neon","type":"section","tag":"동료를 대하는 태도 / 문제를 대하는 태도","title":"일하는방식 5가지","items":[{"group":"동료를 대하는 태도","values":["진정성","협업"]},{"group":"문제를 대하는 태도","values":["문제해결","빠른실행","책임감"]}]},{"id":6,"theme":"dark-neon","type":"way","tag":"일하는방식 01","title":"진정성","subtitle":"투명하고, 솔직하게","badge":"동료를 대하는 태도","body":"우리는 상호존중을 기반으로 일하며,\n회사를 위해서 숨기지 않고,\n솔직하게 말합니다"},{"id":7,"theme":"dark-neon","type":"way","tag":"일하는방식 02","title":"협업","subtitle":"함께, 성장하기","badge":"동료를 대하는 태도","body":"우리는 혼자가 아닌,\n함께 일하며 성장합니다"},{"id":8,"theme":"dark-neon","type":"way","tag":"일하는방식 03","title":"문제해결","subtitle":"발견하고, 해결하기","badge":"문제를 대하는 태도","body":"문제는 문제를 '발견하는 순간'부터 시작합니다.\n우리는 문제를 숨기지 않고,\n함께 해결합니다"},{"id":9,"theme":"dark-neon","type":"way","tag":"일하는방식 04","title":"빠른실행","subtitle":"작고, 빠르게","badge":"문제를 대하는 태도","body":"우리는 작게 시도하고,\n빠르게 검증합니다"},{"id":10,"theme":"dark-neon","type":"way","tag":"일하는방식 05","title":"책임감","subtitle":"주도적으로, 마무리까지","badge":"문제를 대하는 태도","body":"우리는 내가 시작한 일은 책임지고,\n끝까지 마무리합니다"},{"id":11,"theme":"dark-neon","type":"culture-intro","tag":"조직문화","title":"조직문화 1.0\n환경설정","items":[{"number":"1","desc":"진정성 있는 소통을 위한","label":"'님' 문화"},{"number":"2","desc":"투명한 소통을 위한","label":"안심톡"},{"number":"3","desc":"우리의 관계 형성을 위한","label":"랜덤런치"},{"number":"4","desc":"업무 효율을 높이기 위한","label":"코어워킹"}]},{"id":12,"theme":"dark-neon","type":"culture-item","tag":"조직문화 01","title":"'님' 문화","subtitle":"인욱'님'이라 불러주세요","badge":"진정성 있는 소통","body":"상호 존중을 바탕으로,\n눈치 보지 않고 명확하게\n사실과 의견을 나눕니다"},{"id":13,"theme":"dark-neon","type":"culture-item","tag":"조직문화 02","title":"안심톡","subtitle":"회사를 위한 개선 의견을 보내주세요!","badge":"투명한 소통","body":"누구나 자유롭게 묻고 제안하는 공간,\n명확하고 투명한 피드백을 약속합니다"},{"id":14,"theme":"dark-neon","type":"culture-item","tag":"조직문화 03","title":"랜덤런치","subtitle":"평소 이야기 나누지 못 한 동료와 함께!","badge":"관계 형성","body":"자유롭게 소통하고,\n여러 구성원과 관계를 맺어보세요!"},{"id":15,"theme":"dark-neon","type":"culture-item","tag":"조직문화 04","title":"코어워킹","subtitle":"업무에 더 집중하여 실행의 속도를 올려보세요!","badge":"업무 효율","body":"코어워킹 시간에는 No Meeting, No Slack\n매주 월요일 10:10 ~ 12:10\n동료의 시간을 존중하고 배려해주세요"},{"id":16,"theme":"dark-neon","type":"qna-dashboard","tag":"익명채널 Q&A","title":"안심톡 현황"},{"id":17,"theme":"dark-neon","type":"qna-detail","tag":"익명채널 Q&A","title":"전체 내역"}]};

/* ============================================================
   FETCH & INIT
============================================================ */
function initWithData(data) {
  slides = data.slides || [];
  cfg = Object.assign(cfg, data.config || {});
  if (cfg.accentColor) {
    document.documentElement.style.setProperty('--accent', cfg.accentColor);
  }
  buildSlides();
  buildDots();
  goTo(0, false);
  if (playing) resumeAll();
  showUI();
  // QnA 슬라이드가 있으면 데이터 fetch
  if (slides.some(s => s.type === 'qna-dashboard' || s.type === 'qna-detail')) {
    fetchQnaData();
  }
}

fetch('slides.json')
  .then(r => { if (!r.ok) throw new Error('not ok'); return r.json(); })
  .then(data => initWithData(data))
  .catch(() => {
    // file:// 환경이거나 slides.json 없으면 내장 데이터 사용
    initWithData(FALLBACK);
  });

/* ============================================================
   BUILD SLIDES
============================================================ */
function buildSlides() {
  const sw = document.getElementById('slideshow');
  sw.innerHTML = '';
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    const isQna = s.type === 'qna-dashboard' || s.type === 'qna-detail';
    el.className = `slide theme-${s.theme || 'dark-neon'}${isQna ? ' qna-slide' : ''}`;
    el.dataset.i = i;

    // canvas
    const cv = document.createElement('canvas');
    cv.className = 'slide-canvas';
    cv.id = `cv${i}`;
    el.appendChild(cv);

    // ghost number
    const gn = document.createElement('div');
    gn.className = 'slide-ghost-num';
    gn.textContent = String(i + 1).padStart(2, '0');
    el.appendChild(gn);

    // content
    const cnt = document.createElement('div');
    cnt.className = 'slide-content';
    cnt.innerHTML = renderSlide(s);
    el.appendChild(cnt);

    el.addEventListener('click', togglePlay);
    sw.appendChild(el);
  });
}

function renderSlide(s) {
  const type = s.type || 'default';
  const nl = t => (t || '').replace(/\n/g, '<br>');
  let h = '';

  const tag    = s.tag    ? `<div class="s-el s-tag">${s.tag}</div>` : '';
  const badge  = s.badge  ? `<div class="s-el s-badge">${s.badge}</div>` : '';
  const title  = s.title  ? `<div class="s-el s-title">${nl(s.title)}</div>` : '';
  const sub    = s.subtitle ? `<div class="s-el s-subtitle">${nl(s.subtitle)}</div>` : '';
  // title + subtitle 가로 배치 (way / culture-item 전용)
  const titleSubRow = s.title && s.subtitle
    ? `<div class="s-el title-sub-row">
        <div class="s-title">${nl(s.title)}</div>
        <div class="s-subtitle">${nl(s.subtitle)}</div>
       </div>`
    : (s.title ? title : '');
  const div    = `<div class="s-el s-divider"></div>`;
  const body   = s.body   ? `<div class="s-el s-body">${nl(s.body)}</div>` : '';

  if (type === 'intro') {
    h = tag + title + div + body;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="intro-item">
          <div class="intro-item-num">${it.number}</div>
          <div class="intro-item-label">${it.label}</div>
          <div class="intro-item-desc">${it.desc}</div>
        </div>`).join('');
      h += `<div class="s-el intro-items">${items}</div>`;
    }

  } else if (type === 'value') {
    h = badge + tag + title + div + body;

  } else if (type === 'section') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const groups = s.items.map(g => `
        <div>
          <div class="section-group-name">${g.group}</div>
          <div class="section-group-values">
            ${g.values.map(v => `<div class="section-group-val">${v}</div>`).join('')}
          </div>
        </div>`).join('');
      h += `<div class="s-el section-groups">${groups}</div>`;
    }

  } else if (type === 'way') {
    h = badge + tag + titleSubRow + div + body;

  } else if (type === 'culture-intro') {
    h = tag + title + div;
    if (s.items && s.items.length) {
      const items = s.items.map(it => `
        <div class="culture-grid-item">
          <div class="culture-grid-num">${it.number}</div>
          <div class="culture-grid-text">
            <div class="culture-grid-desc">${it.desc}</div>
            <div class="culture-grid-label">${it.label}</div>
          </div>
        </div>`).join('');
      h += `<div class="s-el culture-grid">${items}</div>`;
    }

  } else if (type === 'culture-item') {
    h = badge + tag + titleSubRow + div + body;

  } else if (type === 'qna-dashboard') {
    // 동적 데이터 — 나중에 updateQnaSlides()로 채워짐
    h = tag + title + div + `<div class="qna-container s-el"><div class="qna-loading">데이터 불러오는 중…</div></div>`;

  } else if (type === 'qna-detail') {
    h = tag + title + div + `<div class="qna-container s-el"><div class="qna-loading">데이터 불러오는 중…</div></div>`;

  } else {
    h = (tag || badge) + title + div + body;
  }

  return h;
}

/* ============================================================
   DOTS
============================================================ */
function buildDots() {
  const dc = document.getElementById('dots');
  dc.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', e => { e.stopPropagation(); goTo(i); });
    dc.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function updateCounter() {
  document.getElementById('slide-counter').textContent =
    `${String(current + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
}

/* ============================================================
   NAVIGATION
============================================================ */
function goTo(idx, animate = true) {
  const all = document.querySelectorAll('.slide');

  // Clear previous
  all.forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.s-el').forEach(el => el.classList.remove('in'));
  });

  stopCanvas(current);

  current = ((idx % slides.length) + slides.length) % slides.length;
  const el = all[current];
  el.classList.add('active');

  // Staggered entrance
  const els = el.querySelectorAll('.s-el');
  els.forEach((e, i) => {
    setTimeout(() => e.classList.add('in'), 120 + i * 200);
  });

  updateDots();
  updateCounter();
  startCanvas(current);

  if (animate) {
    resetProgress();
    if (playing) restartSlideTimer();
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

/* ============================================================
   PLAY / PAUSE
============================================================ */
function togglePlay(e) {
  if (e) e.stopPropagation();
  playing ? pauseAll() : resumeAll();
}

function resumeAll() {
  playing = true;
  document.getElementById('btn-play').innerHTML = '⏸';
  document.getElementById('pause-overlay').classList.remove('show');
  progressTick = Date.now();
  startProgressRAF();
  restartSlideTimer();
}

function pauseAll() {
  playing = false;
  document.getElementById('btn-play').innerHTML = '▶';
  document.getElementById('pause-overlay').classList.add('show');
  progressOffset += Date.now() - progressTick;
  clearTimeout(slideTimerID);
  cancelAnimationFrame(progressRAF);
}

/* ============================================================
   SLIDE TIMER
============================================================ */
function restartSlideTimer() {
  clearTimeout(slideTimerID);
  const remaining = DURATION() - progressOffset;
  slideTimerID = setTimeout(() => {
    if (playing) next();
  }, Math.max(remaining, 0));
}

/* ============================================================
   PROGRESS BAR
============================================================ */
function resetProgress() {
  progressOffset = 0;
  progressTick = Date.now();
  document.getElementById('progress-bar').style.width = '0%';
}

function startProgressRAF() {
  cancelAnimationFrame(progressRAF);
  const bar = document.getElementById('progress-bar');
  function tick() {
    if (!playing) return;
    const elapsed = progressOffset + (Date.now() - progressTick);
    const pct = Math.min(elapsed / DURATION() * 100, 100);
    bar.style.width = pct + '%';
    progressRAF = requestAnimationFrame(tick);
  }
  progressRAF = requestAnimationFrame(tick);
}

/* ============================================================
   UI AUTO-HIDE
============================================================ */
function showUI() {
  document.getElementById('ui').classList.remove('ui-hidden');
  document.getElementById('cursor').classList.remove('ui-hidden');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    if (playing) {
      document.getElementById('ui').classList.add('ui-hidden');
      document.getElementById('cursor').classList.add('ui-hidden');
    }
  }, 3000);
}

document.addEventListener('mousemove', showUI);
document.addEventListener('keydown', showUI);

/* ============================================================
   CUSTOM CURSOR
============================================================ */
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowRight': next(); break;
    case 'ArrowLeft':  prev(); break;
    case ' ':
      e.preventDefault();
      togglePlay();
      break;
    case 'f': case 'F':
      toggleFullscreen();
      break;
  }
});

/* ============================================================
   BUTTONS
============================================================ */
document.getElementById('btn-prev').addEventListener('click', e => { e.stopPropagation(); prev(); });
document.getElementById('btn-next').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('btn-play').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
document.getElementById('btn-fullscreen').addEventListener('click', e => { e.stopPropagation(); toggleFullscreen(); });

/* ============================================================
   FULLSCREEN
============================================================ */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

/* ============================================================
   CANVAS BACKGROUND ANIMATIONS
============================================================ */
function startCanvas(idx) {
  const slide = slides[idx];
  if (!slide) return;
  const cv = document.getElementById(`cv${idx}`);
  if (!cv) return;

  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const theme = slide.theme || 'dark-neon';
  let rafID;

  if (theme === 'dark-neon') {
    /* dark-neon: 새싹 파티클 네트워크 — 딥 포레스트 위 연두빛 별빛 */
    const pts = Array.from({ length: 65 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.6 + 0.4,
      ph: Math.random() * Math.PI * 2,
      type: Math.random() > 0.6 ? 1 : 0   /* 0=dot, 1=tiny leaf shimmer */
    }));

    function drawNeon() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 1000;

      // 상단 우측 — 새싹 그린 + 옥빛 glow
      const gr = ctx.createRadialGradient(W * 0.78, H * 0.14, 0, W * 0.78, H * 0.14, W * 0.55);
      const ga = 0.06 + 0.03 * Math.sin(t * 0.6);
      gr.addColorStop(0, `rgba(161,228,208,${ga})`);       /* soft jade */
      gr.addColorStop(0.45, `rgba(196,243,189,${ga * 0.5})`); /* sprout green */
      gr.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);

      // 좌하단 — 따뜻한 햇살 glow
      const gr2 = ctx.createRadialGradient(W * 0.05, H * 0.9, 0, W * 0.05, H * 0.9, W * 0.4);
      const ga2 = 0.04 + 0.02 * Math.sin(t * 0.4 + 1);
      gr2.addColorStop(0, `rgba(196,243,189,${ga2})`);
      gr2.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr2; ctx.fillRect(0, 0, W, H);

      // 파티클
      pts.forEach(p => {
        p.ph += 0.012;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const a = 0.18 + 0.22 * Math.sin(p.ph);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.type ? `rgba(161,228,208,${a})` : `rgba(196,243,189,${a})`;
        ctx.fill();
      });

      // 연결선
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 115) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(196,243,189,${0.08 * (1 - d / 115)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      rafID = requestAnimationFrame(drawNeon);
    }
    drawNeon();

  } else if (theme === 'dark-amber') {
    /* dark-amber: 이끼 그리드 + 햇살 glow */
    function drawGrid() {
      ctx.clearRect(0, 0, W, H);
      const t = Date.now() / 5000;
      const ox = Math.sin(t) * 22; const oy = Math.cos(t * 0.8) * 16;
      const gs = 68;

      ctx.strokeStyle = 'rgba(196,243,189,0.055)';
      ctx.lineWidth = 1;
      for (let x = (ox % gs) - gs; x < W + gs; x += gs) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = (oy % gs) - gs; y < H + gs; y += gs) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // 좌하단 — 새싹 glow
      const t2 = Date.now() / 1000;
      const a2 = 0.05 + 0.025 * Math.sin(t2 * 0.55);
      const gr2 = ctx.createRadialGradient(W * 0.1, H * 0.87, 0, W * 0.1, H * 0.87, W * 0.52);
      gr2.addColorStop(0, `rgba(196,243,189,${a2 * 1.8})`);
      gr2.addColorStop(0.5, `rgba(161,228,208,${a2 * 0.8})`);
      gr2.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr2; ctx.fillRect(0, 0, W, H);

      // 우상단 — 옥빛 보조 glow
      const a3 = 0.03 + 0.015 * Math.sin(t2 * 0.4 + 2);
      const gr3 = ctx.createRadialGradient(W * 0.9, H * 0.1, 0, W * 0.9, H * 0.1, W * 0.4);
      gr3.addColorStop(0, `rgba(161,228,208,${a3})`);
      gr3.addColorStop(1, 'rgba(161,228,208,0)');
      ctx.fillStyle = gr3; ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawGrid);
    }
    drawGrid();

  } else if (theme === 'light-editorial') {
    /* light-editorial: 크림 위 봄비 도트 물결 + 연두 glow */
    let t = 0;
    function drawLight() {
      ctx.clearRect(0, 0, W, H);
      t += 0.004;
      const sp = 46;
      for (let x = sp; x < W; x += sp) {
        for (let y = sp; y < H; y += sp) {
          const dist = Math.hypot(x - W * 0.75, y - H * 0.25);
          const wave = Math.sin(dist * 0.013 - t * 1.6) * 0.5 + 0.5;
          const a = 0.04 + wave * 0.13;
          ctx.beginPath();
          ctx.arc(x, y, 1.3, 0, Math.PI * 2);
          /* 거리에 따라 sprout ↔ jade 색 전환 */
          const blend = Math.min(dist / (W * 0.6), 1);
          const r = Math.round(196 + (161-196)*blend);
          const g = Math.round(243 + (228-243)*blend);
          const b = Math.round(189 + (208-189)*blend);
          ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
          ctx.fill();
        }
      }
      // 우상단 — 연두 햇살 glow
      const a4 = 0.06 + 0.03 * Math.sin(t * 0.85);
      const gr4 = ctx.createRadialGradient(W*0.88, H*0.1, 0, W*0.88, H*0.1, W*0.48);
      gr4.addColorStop(0, `rgba(196,243,189,${a4})`);
      gr4.addColorStop(0.5, `rgba(224,242,241,${a4 * 0.5})`);  /* sky blue tint */
      gr4.addColorStop(1, 'rgba(196,243,189,0)');
      ctx.fillStyle = gr4; ctx.fillRect(0, 0, W, H);

      rafID = requestAnimationFrame(drawLight);
    }
    drawLight();
  }

  canvasHandles[idx] = { cancel: () => cancelAnimationFrame(rafID) };
}

function stopCanvas(idx) {
  if (canvasHandles[idx]) {
    canvasHandles[idx].cancel();
    delete canvasHandles[idx];
  }
}

/* ============================================================
   ⚙️ QnA CONFIG — 여기만 수정하세요
============================================================ */
const QNA = {
  // ① 구글시트 "웹에 게시 → CSV" URL (파일 → 웹에 게시 → page시트 선택 → CSV)
  // 형식: https://docs.google.com/spreadsheets/d/.../pub?gid=1522293836&single=true&output=csv
  CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjAvQUuPgdbcTEyttBmaql0HteaMQU-Guv4hTwToi8r9-Tzf0CKuedSIvFQq0AG0J3ai1gASSMf9Mh/pub?gid=1522293836&single=true&output=csv',

  // ② 컬럼 순서 (0부터 시작)
  COL: { TIMESTAMP:0, CATEGORY:1, QUESTION:2, KEYWORD:3, STATUS:4, ANSWER:5 },

  // ③ 상태 텍스트 (시트 입력값과 정확히 일치)
  ST: { WAIT:'대기', PROC:'진행중', DONE:'완료' },

  // ④ 대시보드에 표시할 카드 수 (최대 6)
  CARD_LIMIT: 6,

  // ⑤ 자동 새로고침 간격 (ms)
  REFRESH_MS: 5 * 60 * 1000,
};

/* ── QnA 샘플 데이터 (로컬 미리보기용 / fetch 실패 시 표시) ── */
const QNA_SAMPLE = [
  // [접수일, 카테고리, 질문, 키워드, 진행상황, 답변]
  ['2026/04/01', '조직문화', '안심톡 질문은 누가 보나요?', '익명,안심톡', '완료', '피플팀만 확인하며 익명성은 완전히 보장됩니다'],
  ['2026/04/02', 'HR', '연차는 언제부터 사용할 수 있나요?', '연차,휴가', '완료', '입사 1개월 후부터 월 1일씩 발생합니다'],
  ['2026/04/03', '조직문화', '랜덤런치 참여는 필수인가요?', '랜덤런치', '진행중', ''],
  ['2026/04/05', '업무방식', '코어워킹 시간에 급한 슬랙은 어떻게 하나요?', '코어워킹,슬랙', '대기', ''],
  ['2026/04/06', 'HR', '재택근무 기준이 있나요?', '재택', '대기', ''],
  ['2026/04/07', '조직문화', '핵심가치 외에 추가로 강조되는 문화가 있나요?', '핵심가치,문화', '진행중', ''],
];

/* ── QnA 전역 데이터 ── */
let qnaRows = [];

/* ── CSV 파서 ── */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (cols.every(c => !c.trim())) continue;
    rows.push(cols);
  }
  return rows;
}
function splitCSVLine(line) {
  const res = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (ch===',' && !inQ) { res.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  res.push(cur.trim()); return res;
}
function gc(row, key) { return (row[QNA.COL[key]] || '').trim(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 상태 배지 HTML ── */
function statusBadge(s) {
  const cls = s===QNA.ST.WAIT?'wait': s===QNA.ST.PROC?'proc': s===QNA.ST.DONE?'done':'cat';
  const icon = s===QNA.ST.WAIT?'🕐 ': s===QNA.ST.PROC?'⚡ ': s===QNA.ST.DONE?'✅ ':'';
  return `<span class="qna-badge qna-badge-${cls}">${icon}${esc(s||'?')}</span>`;
}

/* ── 대시보드 슬라이드 HTML 빌드 ── */
function buildDashboardHTML(rows) {
  const total = rows.length;
  const wait  = rows.filter(r => gc(r,'STATUS')===QNA.ST.WAIT).length;
  const proc  = rows.filter(r => gc(r,'STATUS')===QNA.ST.PROC).length;
  const done  = rows.filter(r => gc(r,'STATUS')===QNA.ST.DONE).length;

  const stats = `
    <div class="qna-stats">
      <div class="qna-stat">
        <div class="qna-stat-val">${total}</div>
        <div class="qna-stat-label">전체</div>
      </div>
      <div class="qna-stat-sep"></div>
      <div class="qna-stat">
        <div class="qna-stat-val wait">${wait}</div>
        <div class="qna-stat-label">대기</div>
      </div>
      <div class="qna-stat">
        <div class="qna-stat-val proc">${proc}</div>
        <div class="qna-stat-label">진행중</div>
      </div>
      <div class="qna-stat">
        <div class="qna-stat-val done">${done}</div>
        <div class="qna-stat-label">완료</div>
      </div>
    </div>`;

  // 완료 → 진행중 → 대기 순, 각 그룹 내 최신순
  const rev = arr => [...arr].reverse();
  const priority = [
    ...rev(rows.filter(r => gc(r,'STATUS')===QNA.ST.DONE)),
    ...rev(rows.filter(r => gc(r,'STATUS')===QNA.ST.PROC)),
    ...rev(rows.filter(r => gc(r,'STATUS')===QNA.ST.WAIT)),
  ].slice(0, QNA.CARD_LIMIT);

  const cards = priority.map(row => {
    const cat = gc(row,'CATEGORY');
    const q   = gc(row,'QUESTION');
    const st  = gc(row,'STATUS');
    const ans = gc(row,'ANSWER');
    return `
      <div class="qna-card">
        <div class="qna-card-top">
          ${cat ? `<span class="qna-badge qna-badge-cat">${esc(cat)}</span>` : ''}
          ${statusBadge(st)}
        </div>
        <div class="qna-card-q">${esc(q)||'—'}</div>
        <div class="qna-card-ans">${ans ? esc(ans) : '답변 준비중'}</div>
      </div>`;
  }).join('');

  return stats + `<div class="qna-cards">${cards || '<div class="qna-loading">등록된 질문이 없어요</div>'}</div>`;
}

/* ── 상세 슬라이드 HTML 빌드 ── */
function buildDetailHTML(rows) {
  if (!rows.length) return '<div class="qna-loading">등록된 질문이 없어요</div>';

  const fmtDate = ts => {
    if (!ts) return '—';
    const d = new Date(ts);
    if (isNaN(d)) return ts.split(' ')[0] || ts;
    return `${d.getMonth()+1}/${d.getDate()}`;
  };

  const trs = rows.map((row, i) => {
    const ts  = gc(row,'TIMESTAMP');
    const cat = gc(row,'CATEGORY');
    const q   = gc(row,'QUESTION');
    const kw  = gc(row,'KEYWORD');
    const st  = gc(row,'STATUS');
    const ans = gc(row,'ANSWER');
    return `<tr>
      <td class="date-c">${fmtDate(ts)}</td>
      <td>${cat ? `<span class="qna-badge qna-badge-cat">${esc(cat)}</span>` : '—'}</td>
      <td class="q-c">${esc(q)||'—'}</td>
      <td>${kw ? `<span style="font-size:.9em;color:rgba(30,58,95,.55)">${esc(kw)}</span>` : '—'}</td>
      <td>${statusBadge(st)}</td>
      <td class="ans-c">${ans ? esc(ans) : '<span style="opacity:.35;font-style:italic">미답변</span>'}</td>
    </tr>`;
  }).join('');

  return `
    <div class="qna-table-wrap">
      <table class="qna-table">
        <thead><tr>
          <th>접수일</th><th>카테고리</th><th>질문</th><th>키워드</th><th>진행상황</th><th>답변</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
}

/* ── QnA 슬라이드 DOM 업데이트 ── */
function updateQnaSlides() {
  document.querySelectorAll('.slide').forEach((el, idx) => {
    const type = slides[idx] && slides[idx].type;
    const container = el.querySelector('.qna-container');
    if (!container) return;

    if (type === 'qna-dashboard') {
      container.innerHTML = buildDashboardHTML(qnaRows);
    } else if (type === 'qna-detail') {
      container.innerHTML = buildDetailHTML(qnaRows);
    }
  });
}

/* ── 데이터 fetch ── */
async function fetchQnaData() {
  try {
    const url = QNA.CSV_URL + (QNA.CSV_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length) {
      qnaRows = rows;
      updateQnaSlides();
    }
  } catch (e) {
    console.warn('[QnA] 데이터 fetch 실패 (로컬 환경):', e.message);
    // file:// 로컬에서는 fetch 불가 → 샘플 데이터로 미리보기
    if (!qnaRows.length) {
      qnaRows = QNA_SAMPLE;
      updateQnaSlides();
      console.info('[QnA] 샘플 데이터로 미리보기 중 — GitHub Pages 배포 후 실데이터 연결됩니다');
    }
  }
}

/* ── 자동 새로고침 (initWithData에서 첫 fetch 호출) ── */
setInterval(fetchQnaData, QNA.REFRESH_MS);
</script>
